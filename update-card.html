<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Update Payment Method · City Park Holdings</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://js.stripe.com/v3/"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--blk:#0d0d0d;--lime:#b5d96e;--lime-dark:#7a9e3b;--red:#d32f2f;--fc:'Barlow Condensed',sans-serif;--fb:'Barlow',sans-serif;}
body{font-family:var(--fb);background:#f5f5f5;color:var(--blk);min-height:100vh;}
.hd{background:var(--blk);padding:16px 24px;border-bottom:5px solid var(--lime)}
.logo{font-family:var(--fc);font-weight:900;font-size:22px;color:#fff;text-decoration:none;display:block}
.logo span{color:var(--lime);font-size:11px;display:block;letter-spacing:.12em;text-transform:uppercase}
.wrap{max-width:480px;margin:32px auto;padding:0 16px 60px}
.card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.10)}
.card-hd{background:var(--blk);padding:20px 24px;border-bottom:4px solid var(--red)}
.card-hd h1{font-family:var(--fc);font-size:26px;font-weight:900;color:#fff;text-transform:uppercase}
.card-hd p{color:#aaa;font-size:13px;margin-top:4px}
.card-bd{padding:24px}
.fg{margin-bottom:16px}
.fl{display:block;font-family:var(--fc);font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#666;margin-bottom:6px}
.card-el{background:#f8f8f8;border:1.5px solid #e0e0e0;border-radius:8px;padding:13px}
.err{color:var(--red);font-size:12px;margin-top:6px;min-height:16px}
.btn{width:100%;background:var(--lime);color:var(--blk);border:none;border-radius:10px;padding:14px;font-family:var(--fc);font-size:16px;font-weight:900;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;margin-top:8px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.note{font-size:12px;color:#888;text-align:center;margin-top:12px;line-height:1.6}
.success{text-align:center;padding:40px 28px}
.success h2{font-family:var(--fc);font-size:32px;font-weight:900;text-transform:uppercase;margin-bottom:8px}
.loading{text-align:center;padding:60px;color:#888}
.error-page{text-align:center;padding:40px}
.error-page h2{font-family:var(--fc);font-size:28px;color:var(--red);margin-bottom:8px}
.info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:14px}
.info-row:last-child{border-bottom:none}
</style>
</head>
<body>
<div class="hd"><a class="logo" href="/">city park<span>holdings</span></a></div>
<div class="wrap">
  <div class="card" id="main-card">
    <div class="loading"><p>Loading...</p></div>
  </div>
</div>

<script>
const SUPA_URL='https://sldahhdbvcxdlqdhmsjd.supabase.co';
const SUPA_KEY='sb_publishable_ZGELlV5vw7QFvva8_8NGcA_pQplXd46';
let passData=null;
let stripe=null;
let cardElement=null;

async function db(table,method,body,query=''){
  const res=await fetch(`${SUPA_URL}/rest/v1/${table}${query}`,{
    method,
    headers:{'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Prefer':'return=representation'},
    body:body?JSON.stringify(body):undefined
  });
  if(!res.ok)return null;
  return res.json();
}

async function init(){
  const params=new URLSearchParams(window.location.search);
  const token=params.get('token');
  if(!token){showError('Invalid link.');return;}
  const passes=await db('passes','GET',null,`?card_update_token=eq.${token}&select=*`);
  if(!passes||!passes.length){showError('This link is invalid or has expired.');return;}
  passData=passes[0];
  if(passData.status==='active'){
    showSuccess('Your payment method is already up to date and your pass is active!');
    return;
  }
  showForm();
}

function showForm(){
  const p=passData;
  document.getElementById('main-card').innerHTML=`
    <div class="card-hd">
      <h1>Update Payment</h1>
      <p>Update your card to reactivate your parking pass</p>
    </div>
    <div class="card-bd">
      <div style="background:#f5f5f5;border-radius:10px;padding:14px;margin-bottom:20px">
        <div class="info-row"><span style="color:#888">Pass holder</span><span style="font-weight:600">${p.holder_name||p.name}</span></div>
        <div class="info-row"><span style="color:#888">Lot</span><span style="font-weight:600">${p.lot_name||'—'}</span></div>
        <div class="info-row"><span style="color:#888">Monthly rate</span><span style="font-weight:600">$${(p.custom_price||p.monthly_amount||0).toFixed(2)}/mo</span></div>
      </div>
      <div class="fg">
        <label class="fl">New card details</label>
        <div class="card-el" id="card-element"></div>
        <div class="err" id="card-errors"></div>
      </div>
      <button class="btn" id="update-btn" onclick="submitCardUpdate()">
        Update & Retry Payment
      </button>
      <p class="note"><i>🔒</i> Secured by Stripe · We never store your card details</p>
    </div>
  `;

  stripe=Stripe('pk_test_51ToAC1CRGT2uMGb0UnwvpT7KnbgRAzPjoMlnFGt1qWsOOnWQfqc8xOM9gjTQ5GEU360rWLIClQNXKo1v3WhA0zwb00siXv5x5V');
  const elements=stripe.elements();
  cardElement=elements.create('card',{
    style:{
      base:{fontFamily:'Barlow,sans-serif',fontSize:'16px',color:'#0d0d0d','::placeholder':{color:'#888'}},
      invalid:{color:'#d32f2f'}
    }
  });
  cardElement.mount('#card-element');
  cardElement.on('change',e=>{
    const err=document.getElementById('card-errors');
    if(err)err.textContent=e.error?e.error.message:'';
  });
}

async function submitCardUpdate(){
  const btn=document.getElementById('update-btn');
  if(btn){btn.textContent='Processing...';btn.disabled=true;}

  const {paymentMethod,error}=await stripe.createPaymentMethod({type:'card',card:cardElement});
  if(error){
    const el=document.getElementById('card-errors');
    if(el)el.textContent=error.message;
    if(btn){btn.textContent='Update & Retry Payment';btn.disabled=false;}
    return;
  }

  const res=await fetch(`${SUPA_URL}/functions/v1/update-card`,{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+SUPA_KEY},
    body:JSON.stringify({
      passId:passData.id,
      customerId:passData.stripe_customer_id,
      paymentMethodId:paymentMethod.id,
      amount:passData.custom_price||passData.monthly_amount,
      token:new URLSearchParams(window.location.search).get('token')
    })
  });
  const data=await res.json();

  if(data.error){
    const el=document.getElementById('card-errors');
    if(el)el.textContent=data.error;
    if(btn){btn.textContent='Update & Retry Payment';btn.disabled=false;}
    return;
  }

  showSuccess('Your payment method has been updated and your parking pass is now active!');
}

function showSuccess(msg){
  document.getElementById('main-card').innerHTML=`
    <div class="success">
      <div style="font-size:48px;margin-bottom:12px">✅</div>
      <h2>All Set!</h2>
      <p style="color:#666;margin-top:8px">${msg}</p>
      <p style="margin-top:24px;font-size:12px;color:#aaa">Questions? Contact info@cityparkmanagement.com</p>
    </div>
  `;
}

function showError(msg){
  document.getElementById('main-card').innerHTML=`
    <div class="error-page">
      <div style="font-size:48px;margin-bottom:12px">⚠️</div>
      <h2>Oops!</h2>
      <p style="color:#666">${msg}</p>
    </div>
  `;
}

init();
</script>
</body>
</html>
