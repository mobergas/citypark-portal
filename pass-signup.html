<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monthly Pass Signup · City Park Management</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;0,900;1,900&family=Barlow:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://js.stripe.com/v3/"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--blk:#0d0d0d;--lime:#b5d96e;--lime-dark:#7a9e3b;--gold:#f0c040;--red:#d32f2f;--fc:'Barlow Condensed',sans-serif;--fb:'Barlow',sans-serif;}
body{font-family:var(--fb);background:#f5f5f5;color:var(--blk);min-height:100vh;}
.hd{background:var(--blk);padding:16px 24px;border-bottom:5px solid var(--lime)}
.logo{font-family:var(--fc);font-weight:900;font-size:22px;color:#fff;text-decoration:none;display:block}
.logo span{color:var(--lime);font-size:11px;display:block;letter-spacing:.12em;text-transform:uppercase}
.wrap{max-width:480px;margin:32px auto;padding:0 16px 60px}
.card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.10)}
.card-hd{background:var(--blk);padding:24px 28px;border-bottom:4px solid var(--lime)}
.card-hd h1{font-family:var(--fc);font-size:28px;font-weight:900;color:#fff;text-transform:uppercase;letter-spacing:.04em}
.card-hd p{color:#aaa;font-size:13px;margin-top:4px}
.card-bd{padding:24px 28px}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f0f0f0;font-size:14px}
.info-row:last-child{border-bottom:none}
.info-label{color:#888;font-weight:500}
.info-val{font-weight:700;text-align:right}
.info-val.green{color:#2e7d32;font-size:18px;font-family:var(--fc)}
.divider{height:1px;background:#f0f0f0;margin:20px 0}
.fg{margin-bottom:16px}
.fl{display:block;font-family:var(--fc);font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#666;margin-bottom:6px}
.fi{width:100%;background:#f8f8f8;border:1.5px solid #e0e0e0;border-radius:8px;padding:11px 13px;font-family:var(--fb);font-size:15px;color:var(--blk);outline:none;transition:border .15s}
.fi:focus{border-color:var(--lime-dark);background:#fff}
.card-el{background:#f8f8f8;border:1.5px solid #e0e0e0;border-radius:8px;padding:13px}
.card-el.focused{border-color:var(--lime-dark);background:#fff}
.err{color:var(--red);font-size:12px;margin-top:6px;min-height:16px}
.btn{width:100%;background:var(--lime);color:var(--blk);border:none;border-radius:10px;padding:16px;font-family:var(--fc);font-size:18px;font-weight:900;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;margin-top:8px;transition:opacity .15s}
.btn:disabled{opacity:.5;cursor:not-allowed}
.note{font-size:12px;color:#888;text-align:center;margin-top:12px;line-height:1.6}
.success{text-align:center;padding:40px 28px}
.success h2{font-family:var(--fc);font-size:32px;font-weight:900;text-transform:uppercase;margin-bottom:8px}
.success p{color:#666;font-size:14px;line-height:1.7}
.badge{display:inline-block;background:var(--lime);color:var(--blk);font-family:var(--fc);font-size:13px;font-weight:900;letter-spacing:.06em;text-transform:uppercase;padding:4px 12px;border-radius:20px;margin-bottom:16px}
.loading{text-align:center;padding:60px 28px;color:#888}
.error-page{text-align:center;padding:40px 28px}
.error-page h2{font-family:var(--fc);font-size:28px;font-weight:900;color:var(--red);margin-bottom:8px}
</style>
</head>
<body>
<div class="hd"><a class="logo" href="/">city park<span>management</span></a></div>
<div class="wrap">
  <div class="card" id="main-card">
    <div class="loading"><i class="ti ti-loader" style="font-size:32px;color:#ccc"></i><p style="margin-top:12px">Loading your invitation...</p></div>
  </div>
</div>

<script>
const SUPA_URL='https://sldahhdbvcxdlqdhmsjd.supabase.co';
const SUPA_KEY='sb_publishable_ZGELlV5vw7QFvva8_8NGcA_pQplXd46';

let passData=null;
let stripe=null;
let cardElement=null;

async function db(table,method,body,query=''){
  const res=await fetch(`${SUPA_URL}/rest/v1/${table}${query}`,{
    method,
    headers:{
      'Content-Type':'application/json',
      'apikey':SUPA_KEY,
      'Authorization':'Bearer '+SUPA_KEY,
      'Prefer':method==='POST'?'return=representation':'return=representation'
    },
    body:body?JSON.stringify(body):undefined
  });
  if(!res.ok)return null;
  return res.json();
}

async function init(){
  const params=new URLSearchParams(window.location.search);
  const token=params.get('token');
  if(!token){showError('Invalid invitation link.');return;}

  const passes=await db('passes','GET',null,`?signup_token=eq.${token}&select=*`);
  if(passes&&passes.length>0){
    const lotInfo=await db('lots','GET',null,`?id=eq.${passes[0].lot_id}&select=pass_restrictions,address`);
    if(lotInfo&&lotInfo.length>0){passes[0].pass_restrictions=lotInfo[0].pass_restrictions;passes[0].lot_address=lotInfo[0].address||'';}
  }
  if(!passes||!passes.length){showError('This invitation link is invalid or has expired.');return;}
  
  const pass=passes[0];
  if(pass.token_used){showError('This invitation has already been used. Please contact us if you need assistance.');return;}
  if(pass.status==='canceled'){showError('This invitation has been canceled. Please contact us for a new invitation.');return;}

  passData=pass;
  showSignup(pass);
}

function calcProrate(monthlyPrice){
  const now=new Date();
  const daysInMonth=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  const dayOfMonth=now.getDate();
  const daysLeft=daysInMonth-dayOfMonth+1;
  const dailyRate=monthlyPrice/daysInMonth;
  const prorated=+(dailyRate*daysLeft).toFixed(2);
  const nextBill=new Date(now.getFullYear(),now.getMonth()+1,1);
  return{prorated,daysLeft,daysInMonth,nextBill,monthlyPrice};
}

function showSignup(pass){
  const price=pass.custom_price||pass.monthly_price||0;
  const {prorated,daysLeft,daysInMonth,nextBill,monthlyPrice}=calcProrate(price);
  const nextBillStr=nextBill.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  
  document.getElementById('main-card').innerHTML=`
    <div class="card-hd">
      <h1>Monthly Pass Signup</h1>
      <p>Complete your registration below</p>
    </div>
    <div class="card-bd">
      <div class="info-row"><span class="info-label">Name</span><span class="info-val">${pass.holder_name||''}</span></div>
      <div class="info-row"><span class="info-label">Lot</span><span class="info-val">${pass.lot_name||''}</span></div>
      ${pass.lot_address?`<div class="info-row"><span class="info-label">Address</span><span class="info-val">${pass.lot_address}</span></div>`:''}
      <div class="info-row"><span class="info-label">Monthly rate</span><span class="info-val">$${price.toFixed(2)}/mo</span></div>${(()=>{const r=passData.pass_restrictions||{type:'none'};if(r.type==='none'||passData.override_restrictions)return'';return`<div class="info-row"><span class="info-label">Access hours</span><span class="info-val" style="color:#d32f2f;font-size:13px">${getRestrictionTextSignup(r)}</span></div>`;})()}
      <div class="divider"></div>
      <div class="info-row"><span class="info-label">Due today (${daysLeft} of ${daysInMonth} days)</span><span class="info-val green">$${prorated.toFixed(2)}</span></div>
      <div class="info-row"><span class="info-label">Next billing date</span><span class="info-val">${nextBillStr}</span></div>
      <div class="divider"></div>
      <div class="fg">
        <label class="fl">License Plate</label>
        <input class="fi" id="plate-inp" placeholder="e.g. ABC 1234" maxlength="10" oninput="this.value=this.value.toUpperCase()" style="font-family:Barlow Condensed,sans-serif;font-size:22px;font-weight:800;letter-spacing:.12em;text-align:center;text-transform:uppercase">
      </div>
        <div class="fg">
        <label class="fl">Card details</label>
        <div class="card-el" id="card-element"></div>
        <div class="err" id="card-errors"></div>
      </div>
      <button class="btn" id="signup-btn" onclick="submitSignup(${prorated})">
        <i class="ti ti-credit-card"></i> Pay $${prorated.toFixed(2)} & Activate Pass
      </button>
      <p class="note"><i class="ti ti-lock" style="font-size:11px"></i> Secured payment · Your card will be charged $${price.toFixed(2)} on the 1st of each month starting ${nextBillStr}</p>
    </div>
  `;

  stripe=Stripe('pk_test_51ToAC1CRGT2uMGb0UnwvpT7KnbgRAzPjoMlnFGt1qWsOOnWQfqc8xOM9gjTQ5GEU360rWLIClQNXKo1v3WhA0zwb00siXv5x5V');
  const elements=stripe.elements();
  cardElement=elements.create('card',{
    style:{
      base:{fontFamily:'Barlow, sans-serif',fontSize:'16px',color:'#0d0d0d','::placeholder':{color:'#888'}},
      invalid:{color:'#d32f2f'}
    }
  });
  cardElement.mount('#card-element');
  cardElement.on('change',e=>{
    const err=document.getElementById('card-errors');
    if(err)err.textContent=e.error?e.error.message:'';
    const el=document.getElementById('card-element');
    if(el)el.className='card-el'+(e.complete?'':' focused');
  });
  cardElement.on('focus',()=>{
    const el=document.getElementById('card-element');
    if(el)el.classList.add('focused');
  });
  cardElement.on('blur',()=>{
    const el=document.getElementById('card-element');
    if(el)el.classList.remove('focused');
  });
}

async function submitSignup(prorated){
  const btn=document.getElementById('signup-btn');
  if(btn){btn.textContent='Processing...';btn.disabled=true;}

  const {paymentMethod,error}=await stripe.createPaymentMethod({
    type:'card',
    card:cardElement,
  });

  if(error){
    const el=document.getElementById('card-errors');
    if(el)el.textContent=error.message;
    if(btn){btn.textContent=`Pay $${prorated.toFixed(2)} & Activate Pass`;btn.disabled=false;}
    return;
  }

  const price=passData.custom_price||passData.monthly_price||0;
  const {prorated:amount,nextBill}=calcProrate(price);

  const res=await fetch(`${SUPA_URL}/functions/v1/stripe-setup`,{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+SUPA_KEY},
    body:JSON.stringify({
      paymentMethodId:paymentMethod.id,
      email:passData.email||'',
      name:passData.holder_name||'',
      amount,
      description:`Monthly parking pass - ${passData.lot_name} - ${passData.holder_name}`
    })
  });
  const data=await res.json();

  if(data.error){
    const el=document.getElementById('card-errors');
    if(el)el.textContent=data.error;
    if(btn){btn.textContent=`Pay $${prorated.toFixed(2)} & Activate Pass`;btn.disabled=false;}
    return;
  }

  // Update pass in database
  const plate=(document.getElementById('plate-inp')?.value||'').toUpperCase().trim();
  await db('passes','PATCH',{
    status:'active',
    token_used:true,
    stripe_customer_id:data.customerId,
    stripe_payment_method_id:data.paymentMethodId,
    next_bill_date:nextBill.toISOString(),
    start_date:new Date().toISOString(),
    plate:plate||null,
    billed_at:new Date().toISOString()
  },`?signup_token=eq.${passData.signup_token}`);

  // Send receipt email
  await fetch(`${SUPA_URL}/functions/v1/send-email`,{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+SUPA_KEY},
    body:JSON.stringify({
      to:passData.email,
      subject:'Welcome to City Park Monthly Parking — Receipt',
      html:`<!DOCTYPE html><html><body style="margin:0;padding:0;background:#f5f5f5;font-family:Arial,sans-serif;"><table width="100%" cellpadding="0" cellspacing="0" style="background:#f5f5f5;padding:30px 0;"><tr><td align="center"><table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:12px;overflow:hidden;"><tr><td style="background:#0d0d0d;padding:24px 32px;border-bottom:5px solid #b5d96e;"><span style="font-weight:900;font-size:22px;color:#ffffff;">city park</span><span style="font-weight:900;font-size:11px;color:#b5d96e;letter-spacing:0.12em;text-transform:uppercase;display:block;margin-top:2px;">management</span></td></tr><tr><td style="padding:32px;font-size:15px;line-height:1.7;color:#444;"><h2 style="margin-bottom:4px;">Welcome, ${passData.holder_name||passData.name}!</h2><p style="color:#888;font-size:13px;margin-bottom:24px;">Your monthly parking pass is now active.</p><table width="100%" cellpadding="8" cellspacing="0" style="background:#f5f5f5;border-radius:8px;margin-bottom:24px;"><tr><td style="color:#888;font-size:13px;">Lot</td><td style="font-weight:700;">${passData.lot_name}</td></tr><tr><td style="color:#888;font-size:13px;">Address</td><td style="font-weight:700;">${passData.lot_address||'—'}</td></tr><tr><td style="color:#888;font-size:13px;">Plate</td><td style="font-weight:700;">${document.getElementById('plate-inp')?.value||'—'}</td></tr><tr><td style="color:#888;font-size:13px;">Amount Charged Today</td><td style="font-weight:700;color:#2e7d32;">$${amount.toFixed(2)}</td></tr><tr><td style="color:#888;font-size:13px;">Monthly Rate</td><td style="font-weight:700;">$${price.toFixed(2)}/mo</td></tr><tr><td style="color:#888;font-size:13px;">Next Bill Date</td><td style="font-weight:700;">${nextBill.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}</td></tr></table><p style="font-size:13px;color:#888;">Your card will be charged automatically on the 1st of each month. To cancel or make changes contact us at <a href="mailto:info@cityparkmanagement.com">info@cityparkmanagement.com</a></p></td></tr><tr><td style="background:#f5f5f5;padding:16px 32px;text-align:center;font-size:11px;color:#888;">City Park Holdings LLC · info@cityparkmanagement.com</td></tr></table></td></tr></table></body></html>`
    })
  });
  showSuccess(passData,price,nextBill);
}

function showSuccess(pass,price,nextBill){
  const nextBillStr=nextBill.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  document.getElementById('main-card').innerHTML=`
    <div class="success">
      <div style="font-size:48px;margin-bottom:12px">✓</div>
      <div class="badge">Pass Activated</div>
      <h2>Welcome, ${pass.holder_name||''}!</h2>
      <p style="margin-top:12px">Your monthly parking pass for <strong>${pass.lot_name}</strong> is now active.</p>
      <p style="margin-top:8px">Your card will be charged <strong>$${price.toFixed(2)}</strong> on <strong>${nextBillStr}</strong> and on the 1st of each month after that.</p>
      <p style="margin-top:24px;font-size:12px;color:#aaa">Questions? Contact us at info@cityparkmanagement.com</p>
    </div>
  `;
}

function showError(msg){
  document.getElementById('main-card').innerHTML=`
    <div class="error-page">
      <div style="font-size:48px;margin-bottom:12px">⚠️</div>
      <h2>Oops!</h2>
      <p style="color:#666;margin-top:8px">${msg}</p>
      <p style="margin-top:16px;font-size:13px;color:#aaa">Contact us at info@cityparkmanagement.com</p>
    </div>
  `;
}

function getRestrictionTextSignup(r){
  if(r.type==='weekdays')return'Mon-Fri only';
  if(r.type==='weekends')return'Sat-Sun only';
  if(r.type==='days')return(r.days||[]).join(', ')+' only';
  if(r.type==='hours')return r.start_time+' - '+r.end_time;
  if(r.type==='both')return(r.days||[]).join(', ')+' · '+r.start_time+'-'+r.end_time;
  return'';
}

init();
</script>
</body>
</html>
