<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Enforcement · City Park Management</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--blk:#0d0d0d;--lime:#b5d96e;--lime-dark:#7a9e3b;--red:#d32f2f;--gold:#f0c040;--fc:'Barlow Condensed',sans-serif;--fb:'Barlow',sans-serif;}
body{font-family:var(--fb);background:#0d0d0d;color:#fff;min-height:100vh;}
.hd{background:#111;padding:14px 16px;border-bottom:3px solid var(--lime);display:flex;align-items:center;justify-content:space-between}
.logo{font-family:var(--fc);font-weight:900;font-size:20px;color:#fff}
.logo span{color:var(--lime);font-size:10px;display:block;letter-spacing:.12em;text-transform:uppercase}
.badge{background:var(--lime);color:var(--blk);font-family:var(--fc);font-size:11px;font-weight:900;padding:3px 10px;border-radius:20px;letter-spacing:.06em;text-transform:uppercase}
.wrap{padding:16px;max-width:500px;margin:0 auto}
.card{background:#1a1a1a;border-radius:12px;padding:16px;margin-bottom:14px;border:1px solid #2a2a2a}
.card-title{font-family:var(--fc);font-size:14px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#888;margin-bottom:10px}
.fl{display:block;font-family:var(--fc);font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#666;margin-bottom:5px}
.fi{width:100%;background:#222;border:1.5px solid #333;border-radius:8px;padding:12px 13px;font-family:var(--fb);font-size:15px;color:#fff;outline:none}
.fi:focus{border-color:var(--lime-dark)}
.fse{width:100%;background:#222;border:1.5px solid #333;border-radius:8px;padding:12px 13px;font-family:var(--fc);font-size:15px;font-weight:700;color:#fff;outline:none}
.plate-inp{font-family:var(--fc);font-size:32px;font-weight:900;letter-spacing:.15em;text-transform:uppercase;text-align:center}
.btn{width:100%;background:var(--lime);color:var(--blk);border:none;border-radius:10px;padding:14px;font-family:var(--fc);font-size:17px;font-weight:900;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;margin-top:8px}
.btn.red{background:var(--red);color:#fff}
.btn.outline{background:transparent;border:1.5px solid #333;color:#fff}
.btn:disabled{opacity:.5}
.status-ok{background:#0a2e0a;border:2px solid #2e7d32;border-radius:10px;padding:14px;margin-bottom:12px}
.status-warn{background:#2e1a00;border:2px solid var(--gold);border-radius:10px;padding:14px;margin-bottom:12px}
.status-bad{background:#2e0000;border:2px solid var(--red);border-radius:10px;padding:14px;margin-bottom:12px}
.status-title{font-family:var(--fc);font-size:18px;font-weight:900;text-transform:uppercase;margin-bottom:4px}
.status-detail{font-size:13px;color:#aaa;line-height:1.6}
.vtype{background:#222;border:1.5px solid #333;border-radius:8px;padding:10px 14px;margin-bottom:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.vtype.selected{border-color:var(--red);background:#2e0000}
.vtype-name{font-family:var(--fc);font-size:15px;font-weight:800}
.vtype-fine{font-family:var(--fc);font-size:15px;font-weight:900;color:var(--red)}
.hist-row{padding:10px 0;border-bottom:1px solid #222;font-size:13px}
.hist-row:last-child{border-bottom:none}
.sp{display:inline-block;font-family:var(--fc);font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:2px 8px;border-radius:4px}
.sp.active{background:#0a2e0a;color:#4caf50}
.sp.expired{background:#222;color:#666}
.sp.unpaid{background:#2e1a00;color:var(--gold)}
.sp.paid{background:#0a2e0a;color:#4caf50}
.photo-upload{background:#222;border:2px dashed #333;border-radius:10px;padding:20px;text-align:center;cursor:pointer;margin-bottom:12px}
.photo-preview{width:120px;height:120px;object-fit:cover;border-radius:8px;margin-bottom:12px;display:none}
@media print{
  .hd,#screen-lot,#screen-lookup,#screen-violation,#issued-summary,.btn{display:none!important}
  body,#screen-issued,#print-ticket{display:block!important;background:#fff!important}
  #print-ticket *{color:#000!important}
  @page{margin:0;size:3in auto}
}
</style>
</head>
<body>
<div class="hd">
  <div class="logo">city park<span>enforcement</span></div>
  <div style="display:flex;align-items:center;gap:8px">
    <div id="lot-badge" class="badge" style="display:none">No Lot Selected</div>
    <div id="user-badge" style="display:none;font-family:var(--fc);font-size:11px;font-weight:700;color:#888"></div>
    <button id="signout-btn" onclick="enfSignOut()" style="display:none;background:transparent;border:1px solid #333;border-radius:6px;padding:4px 10px;font-family:var(--fc);font-size:11px;font-weight:700;color:#666;cursor:pointer">Sign Out</button>
  </div>
</div>

<div class="wrap" id="main">
  <!-- Lot selection screen -->
  <div id="screen-lot">
    <div style="text-align:center;padding:40px 0 24px">
      <div style="font-size:48px;margin-bottom:8px">🅿️</div>
      <div style="font-family:var(--fc);font-size:24px;font-weight:900;text-transform:uppercase;margin-bottom:4px">Enforcement App</div>
      <div style="font-size:13px;color:#666">Select your assigned lot to begin</div>
    </div>
    <div class="card">
      <label class="fl">Select Lot</label>
      <select class="fse" id="lot-select" onchange="selectLot(this.value)">
        <option value="">— Choose a lot —</option>
      </select>
    </div>
    <div style="text-align:center;margin-top:8px">
      <a href="/" style="font-size:12px;color:#444">← Back to portal</a>
    </div>
  </div>

  <!-- Lookup screen -->
  <div id="screen-lookup" style="display:none">
    <div class="card">
      <div class="card-title"><i class="ti ti-search"></i> Plate Lookup</div>
      <label class="fl">License Plate</label>
      <input class="fi plate-inp" id="plate-input" placeholder="ABC 1234" maxlength="10" oninput="this.value=this.value.toUpperCase()" onkeydown="if(event.key==='Enter')lookupPlate()">
      <button class="btn" onclick="lookupPlate()" style="margin-top:10px"><i class="ti ti-search"></i> Look Up</button>
    </div>
    <div id="lookup-result"></div>
  </div>

  <!-- Issue violation screen -->
  <div id="screen-violation" style="display:none">
    <div class="card">
      <div class="card-title"><i class="ti ti-alert-triangle"></i> Issue Violation</div>
      <div id="violation-plate-display" style="font-family:var(--fc);font-size:28px;font-weight:900;letter-spacing:.15em;color:var(--red);margin-bottom:14px;text-align:center"></div>
      <label class="fl">Violation Type</label>
      <div id="vtype-list"></div>
      <label class="fl" style="margin-top:12px">Notes (optional)</label>
      <textarea class="fi" id="violation-notes" rows="3" placeholder="Additional details..." style="resize:none"></textarea>
      <label class="fl" style="margin-top:12px">Photo Evidence</label>
      <div class="photo-upload" onclick="document.getElementById('photo-input').click()">
        <i class="ti ti-camera" style="font-size:28px;color:#444;display:block;margin-bottom:6px"></i>
        <div style="font-size:13px;color:#666">Tap to take photo or upload</div>
      </div>
      <input type="file" id="photo-input" accept="image/*" capture="environment" style="display:none" onchange="previewPhoto(this)">
      <img id="photo-preview" class="photo-preview">
      <button class="btn red" id="issue-btn" onclick="issueViolation()" disabled><i class="ti ti-file-invoice"></i> Issue Violation</button>
      <button class="btn outline" onclick="showScreen('lookup')" style="margin-top:8px">Cancel</button>
    </div>
  </div>

  <!-- Violation issued screen -->
  <div id="screen-issued" style="display:none">
    <div style="text-align:center;padding:24px 0 12px">
      <div style="font-size:48px;margin-bottom:8px">✅</div>
      <div style="font-family:var(--fc);font-size:24px;font-weight:900;text-transform:uppercase;margin-bottom:4px">Violation Issued</div>
      <div id="issued-summary" style="font-size:13px;color:#888;margin-bottom:16px;line-height:1.7"></div>
    </div>
    <div id="print-ticket" style="background:#fff;border-radius:8px;margin-bottom:12px"></div>
    <button class="btn" onclick="window.print()" style="background:#2563eb;margin-bottom:8px"><i class="ti ti-printer"></i> Print Ticket</button>
    <button class="btn" onclick="newLookup()">Look Up Another Plate</button>
  </div>
</div>

<script>
const SUPA_URL='https://sldahhdbvcxdlqdhmsjd.supabase.co';
const SUPA_KEY='sb_publishable_ZGELlV5vw7QFvva8_8NGcA_pQplXd46';
let currentLot=null;
let currentPlate='';
let selectedViolationType=null;
let violationTypes=[];
let photoFile=null;

async function db(table,method,body,query=''){
  const res=await fetch(`${SUPA_URL}/rest/v1/${table}${query}`,{
    method,
    headers:{'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Prefer':'return=representation'},
    body:body?JSON.stringify(body):undefined
  });
  if(!res.ok)return null;
  return res.json();
}

let currentUser=null;

async function init(){
  // Check for existing session
  const token=localStorage.getItem('enforce_token');
  if(token){
    const profile=await verifyToken(token);
    if(profile){
      currentUser=profile;
      initApp();
      return;
    }
  }
  showLoginScreen();
}

async function verifyToken(token){
  const res=await fetch(`${SUPA_URL}/auth/v1/user`,{
    headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+token}
  });
  if(!res.ok)return null;
  const user=await res.json();
  const profiles=await db('profiles','GET',null,`?id=eq.${user.id}&select=*`);
  if(!profiles||!profiles.length)return null;
  const profile=profiles[0];
  if(!profile.active)return null;
  localStorage.setItem('enforce_token',token);
  return profile;
}

function showLoginScreen(){
  document.getElementById('main').innerHTML=`
    <div style="text-align:center;padding:40px 0 24px">
      <div style="font-size:48px;margin-bottom:8px">🅿️</div>
      <div style="font-family:var(--fc);font-size:24px;font-weight:900;text-transform:uppercase;margin-bottom:4px">Enforcement Login</div>
      <div style="font-size:13px;color:#666;margin-bottom:24px">Sign in with your City Park credentials</div>
    </div>
    <div class="card">
      <label class="fl">Email</label>
      <input class="fi" id="enf-email" type="email" placeholder="your@email.com" autocomplete="username" onkeydown="if(event.key==='Enter')document.getElementById('enf-pass').focus()">
      <label class="fl" style="margin-top:12px">Password</label>
      <input class="fi" id="enf-pass" type="password" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter')enfLogin()" style="margin-bottom:12px">
      <div id="enf-err" style="color:var(--red);font-size:12px;margin-bottom:8px;min-height:16px"></div>
      <button class="btn" onclick="enfLogin()">Sign In</button>
    </div>
  `;
  setTimeout(()=>document.getElementById('enf-email')?.focus(),100);
}

async function enfLogin(){
  const email=document.getElementById('enf-email')?.value.trim();
  const password=document.getElementById('enf-pass')?.value;
  const btn=document.querySelector('.btn');
  if(btn){btn.textContent='Signing in...';btn.disabled=true;}

  const res=await fetch(`${SUPA_URL}/auth/v1/token?grant_type=password`,{
    method:'POST',
    headers:{'Content-Type':'application/json','apikey':SUPA_KEY},
    body:JSON.stringify({email,password})
  });

  if(!res.ok){
    const err=document.getElementById('enf-err');
    if(err)err.textContent='Invalid email or password.';
    if(btn){btn.textContent='Sign In';btn.disabled=false;}
    return;
  }

  const data=await res.json();
  const profile=await verifyToken(data.access_token);

  if(!profile){
    const err=document.getElementById('enf-err');
    if(err)err.textContent='Account not authorized for enforcement.';
    if(btn){btn.textContent='Sign In';btn.disabled=false;}
    return;
  }

  currentUser=profile;
  localStorage.setItem('enforce_token',data.access_token);
  initApp();
}

async function initApp(){
  const lots=await db('lots','GET',null,'?select=*&order=name');
  // Restore the main screens HTML
  document.getElementById('main').innerHTML=`
    <div id="screen-lot">
      <div style="text-align:center;padding:40px 0 24px">
        <div style="font-size:48px;margin-bottom:8px">🅿️</div>
        <div style="font-family:var(--fc);font-size:24px;font-weight:900;text-transform:uppercase;margin-bottom:4px">Enforcement App</div>
        <div style="font-size:13px;color:#666">Select your assigned lot to begin</div>
      </div>
      <div class="card">
        <label class="fl">Select Lot</label>
        <select class="fse" id="lot-select" onchange="selectLot(this.value)">
          <option value="">— Choose a lot —</option>
        </select>
      </div>
    </div>
    <div id="screen-lookup" style="display:none">
      <div class="card">
        <div class="card-title"><i class="ti ti-search"></i> Plate Lookup</div>
        <label class="fl">License Plate</label>
        <input class="fi plate-inp" id="plate-input" placeholder="ABC 1234" maxlength="10" oninput="this.value=this.value.toUpperCase()" onkeydown="if(event.key==='Enter')lookupPlate()">
        <button class="btn" onclick="lookupPlate()" style="margin-top:10px"><i class="ti ti-search"></i> Look Up</button>
      </div>
      <div id="lookup-result"></div>
    </div>
    <div id="screen-violation" style="display:none">
      <div class="card">
        <div class="card-title"><i class="ti ti-alert-triangle"></i> Issue Violation</div>
        <div id="violation-plate-display" style="font-family:var(--fc);font-size:28px;font-weight:900;letter-spacing:.15em;color:var(--red);margin-bottom:14px;text-align:center"></div>
        <label class="fl">Violation Type</label>
        <div id="vtype-list"></div>
        <label class="fl" style="margin-top:12px">Notes (optional)</label>
        <textarea class="fi" id="violation-notes" rows="3" placeholder="Additional details..." style="resize:none"></textarea>
        <label class="fl" style="margin-top:12px">Photo Evidence</label>
        <div class="photo-upload" onclick="document.getElementById('photo-input').click()">
          <i class="ti ti-camera" style="font-size:28px;color:#444;display:block;margin-bottom:6px"></i>
          <div style="font-size:13px;color:#666">Tap to take photo or upload</div>
        </div>
        <input type="file" id="photo-input" accept="image/*" capture="environment" style="display:none" onchange="previewPhoto(this)">
        <img id="photo-preview" class="photo-preview">
        <button class="btn red" id="issue-btn" onclick="issueViolation()" disabled><i class="ti ti-file-invoice"></i> Issue Violation</button>
        <button class="btn outline" onclick="showScreen('lookup')" style="margin-top:8px">Cancel</button>
      </div>
    </div>
    <div id="screen-issued" style="display:none">
      <div style="text-align:center;padding:24px 0 12px">
        <div style="font-size:48px;margin-bottom:8px">✅</div>
        <div style="font-family:var(--fc);font-size:24px;font-weight:900;text-transform:uppercase;margin-bottom:4px">Violation Issued</div>
        <div id="issued-summary" style="font-size:13px;color:#888;margin-bottom:16px;line-height:1.7"></div>
      </div>
      <div id="print-ticket" style="background:#fff;border-radius:8px;margin-bottom:12px"></div>
      <button class="btn" onclick="window.print()" style="background:#2563eb;margin-bottom:8px"><i class="ti ti-printer"></i> Print Ticket</button>
      <button class="btn" onclick="newLookup()">Look Up Another Plate</button>
    </div>
  `;
  showScreen('lot');
  const sel=document.getElementById('lot-select');
  if(sel){
    (lots||[]).forEach(l=>{
      const opt=document.createElement('option');
      opt.value=l.id;
      opt.textContent=l.name+' · Zone '+l.zone;
      sel.appendChild(opt);
    });
  }

  // Load violation types
  const vts=await db('violation_types','GET',null,'?select=*&active=eq.true&order=name');
  violationTypes=vts||[];

  // Show user info
  const ub=document.getElementById('user-badge');
  const sb=document.getElementById('signout-btn');
  if(ub){ub.textContent=currentUser.name;ub.style.display='block';}
  if(sb)sb.style.display='block';
  // Update issued_by
  localStorage.setItem('enforce_officer',currentUser.name);

  // Check saved lot
  const savedLot=localStorage.getItem('enforce_lot');
  if(savedLot&&lots){
    const l=lots.find(x=>x.id===savedLot);
    if(l){currentLot=l;showScreen('lookup');updateLotBadge();}
  }
}

function selectLot(lotId){
  if(!lotId)return;
  const sel=document.getElementById('lot-select');
  const name=sel.options[sel.selectedIndex].text;
  currentLot={id:lotId,name:name.split(' · ')[0],zone:name.split('Zone ')[1]};
  localStorage.setItem('enforce_lot',lotId);
  updateLotBadge();
  showScreen('lookup');
}

function updateLotBadge(){
  const b=document.getElementById('lot-badge');
  if(currentLot){b.innerHTML=`${currentLot.name} <span onclick="changeLot()" style="cursor:pointer;opacity:.7;font-size:10px;margin-left:4px">✕</span>`;b.style.display='block';}
}

function enfSignOut(){
  localStorage.removeItem('enforce_token');
  localStorage.removeItem('enforce_lot');
  currentUser=null;
  currentLot=null;
  document.getElementById('lot-badge').style.display='none';
  showLoginScreen();
}

function changeLot(){
  currentLot=null;
  localStorage.removeItem('enforce_lot');
  showScreen('lot');
  document.getElementById('lot-badge').style.display='none';
}

function showScreen(name){
  ['lot','lookup','violation','issued'].forEach(s=>document.getElementById('screen-'+s).style.display='none');
  document.getElementById('screen-'+name).style.display='block';
  if(name==='lookup'){document.getElementById('lookup-result').innerHTML='';document.getElementById('plate-input').value='';document.getElementById('plate-input').focus();}
}

async function lookupPlate(){
  const plate=document.getElementById('plate-input').value.trim().toUpperCase();
  if(!plate)return;
  currentPlate=plate;
  const result=document.getElementById('lookup-result');
  result.innerHTML=`<div style="text-align:center;padding:20px;color:#666">Searching...</div>`;

  // Check active sessions
  const sessions=await db('sessions','GET',null,`?plate=eq.${encodeURIComponent(plate)}&lot_id=eq.${currentLot.id}&select=*&order=start_time.desc&limit=10`);
  const lotData=await db('lots','GET',null,`?id=eq.${currentLot.id}&select=*`);
  const passes=await db('passes','GET',null,`?plate=eq.${encodeURIComponent(plate)}&lot_id=eq.${currentLot.id}&status=eq.active&select=*`);
  const now=Date.now();
  const activeSess=(sessions||[]).filter(s=>new Date(s.start_time).getTime()+s.duration*3600000>now);


  // Check violation history
  const violations=await db('violations','GET',null,`?plate=eq.${encodeURIComponent(plate)}&order=created_at.desc&limit=5`);

  let html='';

  // Status
  if(activeSess.length>0){
    const s=activeSess[0];
    const exp=new Date(new Date(s.start_time).getTime()+s.duration*3600000);
    html+=`<div class="status-ok"><div class="status-title">✅ Valid Session</div><div class="status-detail">Expires ${exp.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})} · ${s.type} · Paid $${s.paid.toFixed(2)}</div></div>`;
  } else if(passes&&passes.length>0){
    const p=passes[0];
    const lotInfo=await db('lots','GET',null,`?id=eq.${currentLot.id}&select=*`);
  const lot=lotInfo?.[0];
    const restrictions=lot?.pass_restrictions||{type:'none'};
    const isValidNow=p.override_restrictions||checkPassRestrictions(restrictions);
    if(isValidNow){
      html+=`<div class="status-ok"><div class="status-title">✅ Monthly Pass</div><div class="status-detail">${p.holder_name||p.name} · Valid through ${new Date(p.next_bill_date).toLocaleDateString()}${restrictions.type!=='none'?'<br><span style="font-size:11px;color:#4caf50">✓ Within allowed hours/days</span>':''}</div></div>`;
    } else {
      html+=`<div class="status-warn"><div class="status-title">⚠️ Pass Restricted</div><div class="status-detail">${p.holder_name||p.name} has a monthly pass but it is not valid at this time.<br>${getRestrictionText(restrictions)}</div></div>`;
      html+=`<button class="btn red" onclick="startViolation('${plate}')"><i class="ti ti-alert-triangle"></i> Issue Violation</button>`;
    }
  } else {
    html+=`<div class="status-bad"><div class="status-title">❌ No Valid Parking</div><div class="status-detail">No active session or monthly pass found for this plate at ${currentLot.name}</div></div>`;
    html+=`<button class="btn red" onclick="startViolation('${plate}')"><i class="ti ti-alert-triangle"></i> Issue Violation</button>`;
  }

  // Recent sessions
  if(sessions&&sessions.length>0){
    html+=`<div class="card" style="margin-top:14px"><div class="card-title"><i class="ti ti-history"></i> Recent Sessions</div>`;
    sessions.slice(0,5).forEach(s=>{
      const exp=new Date(new Date(s.start_time).getTime()+s.duration*3600000);
      const isActive=exp.getTime()>now;
      html+=`<div class="hist-row"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-family:var(--fc);font-size:14px;font-weight:800">${s.type}</span><span class="sp ${isActive?'active':'expired'}">${isActive?'Active':'Expired'}</span></div><div style="color:#666;margin-top:2px">${new Date(s.start_time).toLocaleDateString()} · $${s.paid.toFixed(2)}</div></div>`;
    });
    html+=`</div>`;
  }

  // Violation history
  if(violations&&violations.length>0){
    html+=`<div class="card" style="margin-top:14px"><div class="card-title" style="color:var(--red)"><i class="ti ti-alert-triangle"></i> Violation History</div>`;
    violations.forEach(v=>{
      html+=`<div class="hist-row"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-family:var(--fc);font-size:14px;font-weight:800">${v.violation_name}</span><span class="sp ${v.status==='paid'?'paid':'unpaid'}">${v.status}</span></div><div style="color:#666;margin-top:2px">${new Date(v.created_at).toLocaleDateString()} · $${v.fine_amount.toFixed(2)} · ${v.lot_name||'—'}</div></div>`;
    });
    html+=`</div>`;
  }

  result.innerHTML=html;
}

async function startViolation(plate){
  currentPlate=plate;
  selectedViolationType=null;
  photoFile=null;
  document.getElementById('violation-plate-display').textContent=plate;
  document.getElementById('violation-notes').value='';
  document.getElementById('photo-preview').style.display='none';
  document.getElementById('issue-btn').disabled=true;

  // Get lot pricing
  const lotInfo=await db('lots','GET',null,`?id=eq.${currentLot.id}&select=*`);

  const eventRate=lot?.pricing?.event||0;

        <div>
          <div style="font-family:var(--fc);font-size:14px;font-weight:800;color:#fff">Daily Max</div>
          <div style="font-size:12px;color:var(--gold);font-weight:700">+$${dailyMax.toFixed(2)}</div>

      <label style="display:flex;align-items:center;gap:10px;cursor:pointer">

          <div style="font-family:var(--fc);font-size:14px;font-weight:800;color:#fff">Event Rate</div>

  showScreen('violation');
}

function selectVType(id){
  document.querySelectorAll('.vtype').forEach(el=>el.classList.remove('selected'));
  document.getElementById('vt-'+id)?.classList.add('selected');
  selectedViolationType=violationTypes.find(v=>v.id===id);
  document.getElementById('issue-btn').disabled=false;
}

function previewPhoto(input){
  const file=input.files[0];
  if(!file)return;
  photoFile=file;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=document.getElementById('photo-preview');
    img.src=e.target.result;
    img.style.display='block';
  };
  reader.readAsDataURL(file);
}

async function issueViolation(){
  if(!selectedViolationType)return;
  const btn=document.getElementById('issue-btn');
  btn.textContent='Issuing...';btn.disabled=true;

  let photoUrl=null;

  // Upload photo if provided
  if(photoFile){
    const fileName=`violations/${Date.now()}_${currentPlate}.jpg`;
    const authToken=localStorage.getItem('enforce_token')||SUPA_KEY;
    const uploadRes=await fetch(`${SUPA_URL}/storage/v1/object/assets/${fileName}`,{
      method:'POST',
      headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+authToken,'Content-Type':photoFile.type},
      body:photoFile
    });
    if(uploadRes.ok){
      photoUrl=`${SUPA_URL}/storage/v1/object/public/assets/${fileName}`;
    }
  }

  const violationId='VIO-'+Date.now().toString().slice(-10);
  const notes=document.getElementById('violation-notes').value.trim();

  // Create Stripe payment link for the fine
  let paymentLink=null;
  let paymentLinkId=null;
  try {
    const stripeRes=await fetch(`${SUPA_URL}/functions/v1/stripe-payment`,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+SUPA_KEY},
      body:JSON.stringify({
        amount:selectedViolationType.fine_amount,

    id:violationId,

    lot_name:currentLot.name,
    violation_type_id:selectedViolationType.id,

  // Build print ticket

      <div style="text-align:center;margin-bottom:4mm">
        <div style="font-size:16px;font-weight:900;letter-spacing:2px">CITY PARK MANAGEMENT</div>
        <div style="font-size:10px">PARKING VIOLATION NOTICE</div>
        <div style="border-top:2px solid #000;margin:2mm 0"></div>
      </div>
      <div style="margin-bottom:3mm">
        <div style="font-size:10px;color:#666">VIOLATION ID</div>
        <div style="font-size:13px;font-weight:900">${violationId}</div>
      </div>
      <div style="margin-bottom:3mm">

        <div style="font-size:13px;font-weight:900">${issuedAt.toLocaleDateString()} ${issuedAt.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>
      </div>
      <div style="margin-bottom:3mm">

      </div>

function checkPassRestrictions(r){
  if(!r||r.type==='none')return true;
  const now=new Date();
  const day=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][now.getDay()];
  const hour=now.getHours();
  const minute=now.getMinutes();
  const timeVal=hour*60+minute;

  if(r.type==='weekdays')return['Mon','Tue','Wed','Thu','Fri'].includes(day);
  if(r.type==='weekends')return['Sat','Sun'].includes(day);
  if(r.type==='days')return(r.days||[]).includes(day);
  if(r.type==='hours'){
    const [sh,sm]=r.start_time.split(':').map(Number);
    const [eh,em]=r.end_time.split(':').map(Number);
    return timeVal>=(sh*60+sm)&&timeVal<=(eh*60+em);
  }
  if(r.type==='both'){
    const dayOk=(r.days||[]).includes(day);
    const [sh,sm]=r.start_time.split(':').map(Number);
    const [eh,em]=r.end_time.split(':').map(Number);
    const timeOk=timeVal>=(sh*60+sm)&&timeVal<=(eh*60+em);
    return dayOk&&timeOk;
  }
  return true;
}

function getRestrictionText(r){
  if(r.type==='weekdays')return'Pass is valid Monday-Friday only.';
  if(r.type==='weekends')return'Pass is valid Saturday-Sunday only.';
  if(r.type==='days')return`Pass is valid on: ${(r.days||[]).join(', ')} only.`;
  if(r.type==='hours')return`Pass is valid ${r.start_time} - ${r.end_time} only.`;
  if(r.type==='both')return`Pass is valid ${(r.days||[]).join(', ')} from ${r.start_time} - ${r.end_time} only.`;
  return'';
}
