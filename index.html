<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City Park Management</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="db.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--lime:#b5d96e;--lime-dark:#8fb84a;--lime-bg:#f0f8e0;--blk:#0d0d0d;--wht:#fff;--g1:#f5f5f5;--g2:#ebebeb;--g3:#c8c8c8;--t1:#0d0d0d;--t2:#444;--t3:#888;--red:#d32f2f;--grn:#2e7d32;--gold:#f59e0b;--gold-bg:#fffbeb;--gold-bd:#fde68a;--blue:#1d4ed8;--f:'Barlow',sans-serif;--fc:'Barlow Condensed',sans-serif}
body{background:var(--g1);color:var(--t1);font-family:var(--f);min-height:100vh;font-size:15px}
.tb-out{background:var(--blk)}.tb{max-width:1200px;margin:0 auto;padding:0 20px;display:flex;align-items:stretch;justify-content:space-between;height:64px}
.logo-a{display:flex;align-items:center}.logo-box{background:#fff;border-radius:6px;padding:5px 12px;display:flex;flex-direction:column;align-items:flex-start;gap:1px;cursor:pointer}
.lcp{font-family:var(--fc);font-weight:900;font-size:22px;color:#0d0d0d;letter-spacing:-.5px}
.lmg{font-family:var(--fc);font-weight:900;font-size:11px;color:#b5d96e;letter-spacing:.12em;text-transform:uppercase}
.nav-tabs{display:flex;align-items:stretch}
.ntab{padding:0 18px;cursor:pointer;font-family:var(--fc);font-size:14px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#999;border:none;background:none;border-bottom:3px solid transparent;display:flex;align-items:center;gap:6px;transition:all .2s}
.ntab.on{color:var(--lime);border-bottom-color:var(--lime)}
.ntab:hover:not(.on){color:#fff}
.ls{height:5px;background:var(--lime)}
.as{display:flex;align-items:center;gap:10px;padding:0 0 0 14px;border-left:1px solid #333}
.av{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--fc);font-weight:900;font-size:12px;color:var(--blk)}
.av-m{background:var(--lime)}.av-e{background:#60a5fa}
.an{font-family:var(--fc);font-size:13px;font-weight:700;color:#ddd;letter-spacing:.04em;text-transform:uppercase;line-height:1.3}
.rb{font-size:10px;font-weight:700;font-family:var(--fc);letter-spacing:.06em;text-transform:uppercase;padding:1px 6px;border-radius:3px}
.rb-m{background:rgba(181,217,110,.2);color:var(--lime)}.rb-e{background:rgba(96,165,250,.2);color:#60a5fa}
.lo-btn{background:none;border:1px solid #333;border-radius:6px;padding:5px 10px;color:#888;font-family:var(--fc);font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;gap:5px}
.lo-btn:hover{border-color:var(--red);color:var(--red)}
.pg{padding:24px 16px}
.fl{font-family:var(--fc);font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);margin-bottom:5px;display:block}
.fg{margin-bottom:14px}
.fi{width:100%;background:var(--g1);border:1.5px solid var(--g2);border-radius:8px;padding:11px 13px;color:var(--t1);font-size:15px;outline:none;font-family:var(--f)}
.fi:focus{border-color:var(--lime-dark);background:#fff}
.fta{width:100%;background:var(--g1);border:1.5px solid var(--g2);border-radius:8px;padding:11px 13px;color:var(--t1);font-size:14px;outline:none;font-family:var(--f);resize:vertical;min-height:80px;line-height:1.6}
.fta:focus{border-color:var(--lime-dark);background:#fff}
.fse{width:100%;background:var(--g1);border:1.5px solid var(--g2);border-radius:8px;padding:11px 13px;color:var(--t1);font-family:var(--f);font-size:15px;outline:none;cursor:pointer}
.fi2{width:100%;background:var(--g1);border:1.5px solid var(--g2);border-radius:8px;padding:12px 14px;color:var(--t1);font-size:15px;outline:none;font-family:var(--f)}
.fi2:focus{border-color:var(--lime-dark);background:#fff}
.fl2{font-family:var(--fc);font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-bottom:6px;display:block}
.fg2{margin-bottom:16px;position:relative}
.pwtog{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--t3);cursor:pointer;font-size:18px;display:flex;align-items:center}
.tg{position:relative;width:38px;height:22px;cursor:pointer;flex-shrink:0;display:inline-block}
.tg input{opacity:0;width:0;height:0}
.tgs{position:absolute;inset:0;background:#ddd;border-radius:11px;transition:.3s}
.tgs:before{content:'';position:absolute;width:16px;height:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tg input:checked+.tgs{background:var(--lime-dark)}
.tg input:checked+.tgs:before{transform:translateX(16px)}
.tr{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--g2)}
.tr:last-child{border:none}
.trl{font-family:var(--fc);font-size:13px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--t2)}
.trs{font-size:11px;color:var(--t3);font-family:var(--f);font-weight:400;text-transform:none;letter-spacing:0;margin-top:1px}
.piw{display:flex;align-items:center;background:var(--g1);border:1.5px solid var(--g2);border-radius:7px;overflow:hidden;flex:1}
.piw:focus-within{border-color:var(--lime-dark)}
.piw span{padding:0 8px;color:var(--t3);font-size:13px;font-weight:600;border-right:1px solid var(--g2);display:flex;align-items:center;align-self:stretch}
.piw input{background:none;border:none;outline:none;color:var(--t1);padding:8px;font-family:var(--fc);font-size:15px;font-weight:700;width:100%}
.ftr{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:8px 10px;background:var(--g1);border-radius:8px;border:1px solid var(--g2)}
.ftl{font-family:var(--fc);font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--t2);width:110px;flex-shrink:0}
.ftt{display:flex;align-items:center;gap:6px;margin-right:8px}
.ftt span{font-size:11px;color:var(--t3)}
.fmi{display:flex;align-items:center;background:#fff;border:1.5px solid var(--g2);border-radius:6px;overflow:hidden;width:90px}
.fmi:focus-within{border-color:var(--lime-dark)}
.fmi span{padding:0 6px;color:var(--t3);font-size:12px;border-right:1px solid var(--g2);display:flex;align-items:center;align-self:stretch}
.fmi input{background:none;border:none;outline:none;color:var(--t1);padding:6px;font-family:var(--fc);font-size:14px;font-weight:700;width:100%}
.fmi input:disabled{color:var(--g3)}
.lw{max-width:420px;margin:40px auto 0}
.lc{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.1)}
.lh{background:var(--blk);padding:24px 28px 20px;position:relative}
.lh::after{content:'';position:absolute;bottom:0;left:0;right:0;height:5px;background:var(--lime)}
.li2{width:50px;height:50px;background:rgba(181,217,110,.15);border:2px solid var(--lime);border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.lh h2{font-family:var(--fc);font-weight:900;font-size:24px;color:#fff;text-transform:uppercase}
.lh p{color:#888;font-size:13px;margin-top:4px}
.lb{padding:24px 28px}
.lbtn{width:100%;background:var(--lime);color:var(--blk);border:none;border-radius:10px;padding:14px;font-family:var(--fc);font-size:18px;font-weight:900;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;margin-top:4px}
.lbtn:hover{background:var(--lime-dark)}
.lerr{background:#fff0f0;border:1.5px solid #ffcdd2;border-radius:8px;padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:16px;display:none;align-items:center;gap:8px}
.lerr.show{display:flex}
.lhint{text-align:center;font-size:12px;color:var(--t3);margin-top:16px;padding-top:14px;border-top:1px solid var(--g2)}
.aw{max-width:1160px;margin:0 auto}
.atb{background:var(--blk);border-radius:12px;padding:0 22px;display:flex;align-items:stretch;justify-content:space-between;margin-bottom:16px;overflow:hidden;position:relative}
.atb::after{content:'';position:absolute;bottom:0;left:0;right:0;height:4px;background:var(--lime)}
.att{padding:16px 0;color:#fff}
.att h2{font-family:var(--fc);font-size:24px;font-weight:900;text-transform:uppercase;letter-spacing:.04em}
.att p{color:#888;font-size:12px;margin-top:2px}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.sc{background:#fff;border-radius:12px;padding:16px 16px 12px;border-bottom:4px solid var(--lime);box-shadow:0 1px 6px rgba(0,0,0,.06)}
.sl{font-family:var(--fc);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:6px;display:flex;align-items:center;gap:5px}
.sv{font-family:var(--fc);font-size:30px;font-weight:900;color:var(--t1)}
.sv.gn{color:var(--grn)}.sv.am{color:#e65100}.sv.go{color:var(--gold)}.sv.bl{color:var(--blue)}
.sd{font-size:11px;color:var(--t3);margin-top:3px}
.pn{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.ph{background:var(--blk);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.ph h3{font-family:var(--fc);font-size:16px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:#fff}
.ph h3 i{color:var(--lime);margin-right:6px}
.pb{padding:14px}
.sb2{display:flex;align-items:center;gap:8px;background:var(--g1);border:1.5px solid var(--g2);border-radius:8px;padding:8px 10px;flex:1;min-width:200px}
.sb2 i{color:var(--t3);font-size:16px;flex-shrink:0}
.sb2 input{background:none;border:none;outline:none;color:var(--t1);font-size:13px;flex:1;font-family:var(--f);min-width:0}
.lfb{padding:7px 13px;border-radius:8px;font-family:var(--fc);font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;border:1.5px solid var(--g2);background:#fff;color:var(--t2);transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:5px}
.lfb.on{background:var(--blk);border-color:var(--blk);color:var(--lime)}
.lfb:hover:not(.on){border-color:var(--lime-dark);color:var(--lime-dark)}
.lfb .lc2{font-size:10px;background:var(--g2);color:var(--t3);padding:1px 5px;border-radius:3px;font-weight:700}
.lfb.on .lc2{background:rgba(255,255,255,.15);color:var(--lime)}
table{width:100%;border-collapse:collapse}
thead th{font-family:var(--fc);font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);padding:7px 10px;text-align:left;border-bottom:2px solid var(--g2)}
tbody tr{border-bottom:1px solid var(--g2);transition:background .15s}
tbody tr:hover{background:var(--lime-bg)}
tbody td{padding:10px;font-size:13px}
tfoot td{padding:10px;font-size:13px;background:var(--lime-bg);font-weight:600}
.pc{font-family:var(--fc);font-weight:800;font-size:16px;letter-spacing:.08em;color:var(--t1)}
.sp{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:4px;font-family:var(--fc);font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.sp.active{background:rgba(46,125,50,.12);color:#2e7d32}
.sp.expiring{background:rgba(230,81,0,.12);color:#e65100}
.sp.expired{background:rgba(211,47,47,.1);color:#d32f2f}
.sp.val{background:rgba(245,158,11,.15);color:#b45309}
.sp.pending{background:rgba(29,78,216,.1);color:var(--blue)}
.sp.canceled{background:var(--g2);color:var(--t3)}
.tb2{height:4px;background:var(--g2);border-radius:3px;margin-top:4px;width:80px}
.tb2f{height:100%;border-radius:3px}
.ab{background:var(--g1);border:1.5px solid var(--g2);border-radius:5px;padding:4px 9px;font-family:var(--fc);font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--t2);cursor:pointer;transition:all .2s}
.ab:hover{border-color:var(--lime-dark);color:var(--lime-dark);background:var(--lime-bg)}
.ab.danger:hover{border-color:var(--red);color:var(--red);background:#fff5f5}
.ab.blue-btn{border-color:var(--blue);color:var(--blue)}
.ab.blue-btn:hover{background:rgba(29,78,216,.08)}
.svb{width:100%;background:var(--lime);color:var(--blk);border:none;border-radius:9px;padding:11px;font-family:var(--fc);font-size:15px;font-weight:900;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;margin-top:4px}
.svb:hover{background:var(--lime-dark)}
.stt{display:none;background:var(--lime-bg);border:1.5px solid var(--lime);color:#3a6b00;border-radius:7px;padding:9px 12px;font-size:12px;text-align:center;margin-top:6px}
.stt.show{display:block}
.stabs{display:flex;gap:0;border-bottom:2px solid var(--g2);margin-bottom:16px;flex-wrap:wrap;overflow-x:auto}
.stab{padding:8px 11px;font-family:var(--fc);font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap}
.stab.on{color:var(--lime-dark);border-bottom-color:var(--lime-dark)}
.stab:hover:not(.on){color:var(--t2)}
.ro3{display:flex;align-items:center;gap:8px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:10px 14px;font-size:13px;color:#1e40af;margin-bottom:14px}
.vg{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.vc{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.06);border:1.5px solid var(--g2)}
.vc.ac{border-color:var(--gold)}
.vch{background:var(--blk);padding:12px 16px 10px;position:relative;display:flex;align-items:center;justify-content:space-between}
.vch::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--gold)}
.vcn{font-family:var(--fc);font-size:16px;font-weight:900;color:#fff;text-transform:uppercase}
.vcl2{font-family:var(--fc);font-size:11px;color:var(--gold);font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.vsd{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.vsd.on{background:#10b981}.vsd.off{background:#555}
.vcb{padding:14px 16px}
.vdr{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--g2);font-size:13px}

.vdl{color:var(--t3);font-family:var(--fc);font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.vtb{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:4px;font-family:var(--fc);font-size:12px;font-weight:800;letter-spacing:.06em;text-transform:uppercase}
.vtf{background:rgba(16,185,129,.15);color:#059669}
.vtd{background:rgba(245,158,11,.15);color:#b45309}
.cc{display:inline-flex;align-items:center;gap:5px;background:var(--blk);color:var(--lime);border-radius:5px;padding:3px 9px;font-family:var(--fc);font-size:13px;font-weight:800;letter-spacing:.12em;text-transform:uppercase}
.vqs{padding:12px 16px;border-top:1px solid var(--g2);display:flex;align-items:center;gap:10px;background:var(--g1)}
.vqi{flex:1}
.vql{font-family:var(--fc);font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);margin-bottom:2px}
.vqu{font-size:11px;color:var(--lime-dark);word-break:break-all}
.vac{display:flex;gap:6px;padding:10px 16px;border-top:1px solid var(--g2);flex-wrap:wrap}
.addc{background:#fff;border:2px dashed var(--g2);border-radius:12px;min-height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:8px}
.addc:hover{border-color:var(--gold);background:var(--gold-bg)}
.addc i{font-size:28px;color:var(--g3)}.addc:hover i,.addc:hover span{color:var(--gold)}
.addc span{font-family:var(--fc);font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--t3)}
.dtg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.dto{border:2px solid var(--g2);border-radius:10px;padding:12px 8px;cursor:pointer;text-align:center;background:#fff}
.dto:hover,.dto.on{border-color:var(--gold);background:var(--gold-bg)}
.dto .dti{font-size:22px;margin-bottom:4px}.dto .dtl{font-family:var(--fc);font-size:13px;font-weight:800;color:var(--t1);text-transform:uppercase}
.dto.on .dtl{color:#b45309}.dto .dts{font-size:11px;color:var(--t3);margin-top:2px}
.lg{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
.lcard{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.lch{background:var(--blk);padding:12px 16px 10px;position:relative}
.lch::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--lime)}
.lcn{font-family:var(--fc);font-size:18px;font-weight:900;color:#fff;text-transform:uppercase}
.lcz{font-family:var(--fc);font-size:11px;color:var(--lime);font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.lcs{padding:12px 16px;border-bottom:1px solid var(--g2)}
.lsr{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:3px 0}
.lsl{color:var(--t3);font-family:var(--fc);font-weight:700;letter-spacing:.06em;text-transform:uppercase;font-size:11px}
.lcq{padding:12px 16px;border-bottom:1px solid var(--g2);display:flex;align-items:center;gap:12px}
.lqi{flex:1}.lql{font-family:var(--fc);font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);margin-bottom:3px}
.lqu{font-size:11px;color:var(--lime-dark);word-break:break-all}
.lac{display:flex;gap:6px;padding:10px 16px;flex-wrap:wrap}

.addl span{font-family:var(--fc);font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--t3)}
.selfserve-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-family:var(--fc);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}

function fmtDate(d){if(!d)return'—';try{return new Date(d).toLocaleDateString([],{month:'short',day:'numeric',year:'numeric'})}catch(e){return'—'}}

{SIGNUP_LINK}

  const l=lot(),p=l.pricing,f=l.fees[S.rate]||{enabled:false,amount:0};
  let base=S.rate==='hourly'?p.hourly*S.hours:S.rate==='event'?p.event:p.monthly;

  let disc=0,discLabel='';

    if(v.type==='free'){disc=base+fee;discLabel='Free Parking ('+v.name+')';}

  if(S.v==='pay')mc.innerHTML=S.cstep===2?renderSuccess():renderPay();
  else if(S.v==='extend')mc.innerHTML=renderExtend();
  else if(S.v==='login')mc.innerHTML=renderLogin();
  else if(S.v==='admin')mc.innerHTML=renderAdmin();
  attachEv();
  if(S.v==='pay'&&S.cstep===2)startTimer();
  if(S.v==='admin')startAdminTimer();
}

function applyCode(){

async function handlePay(){
  if(!S.plate.trim())return;
  const l=lot(),{total,base,fee}=getTotal();
  const dur=S.rate==='hourly'?S.hours:S.rate==='event'?24:720;
  const type=S.rate==='hourly'?'Hourly':S.rate==='event'?'Event Parking':'Monthly';
  const sess={id:'CPM-'+S.tic++,plate:S.plate.trim(),type,start:Date.now(),duration:dur,rate:S.rate,paid:+total,pkch:+base,sfee:+fee,vehicle:S.vehicle,phone:S.phone,smsSent:false,lotId:S.lotId,valId:S.val?S.val.id:null};
  S.sess.unshift(sess);S.payData=sess;S.cstep=2;S.val=null;render();
  await saveSession(sess);
}

function renderExtend(){

function rSessions(){const ro=!isMgr();const allActive=S.sess.filter(s=>gSt(s)!=='expired');const lotIds=Object.keys(S.lots);const cByLot={};lotIds.forEach(id=>{cByLot[id]=allActive.filter(s=>s.lotId===id).length;});return`<div class="pn"><div class="ph"><h3><i class="ti ti-list-check"></i>Active Sessions</h3><span style="font-family:var(--fc);font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#888" id="sbadge">${allActive.length} active</span></div><div class="pb">${ro?`<div class="ro3"><i class="ti ti-eye" style="font-size:15px;flex-shrink:0"></i>View-only mode.</div>`:''}<div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap"><div class="sb2"><i class="ti ti-search"></i><input id="ssearch" placeholder="Search plate or ticket ID..." autocomplete="off" oninput="filterSess()"></div></div><div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px"><button class="lfb${S.sfLot==='all'?' on':''}" onclick="setSF('all')"><i class="ti ti-building" style="font-size:11px"></i> All <span class="lc2">${allActive.length}</span></button>${lotIds.map(id=>`<button class="lfb${S.sfLot===id?' on':''}" onclick="setSF('${id}')"><i class="ti ti-parking" style="font-size:11px"></i> ${S.lots[id].name} <span class="lc2">${cByLot[id]}</span></button>`).join('')}</div><div id="stbl">${bSessTable(allActive,ro)}</div></div></div>`;}
function setSF(id){S.sfLot=id;document.querySelectorAll('.lfb').forEach(btn=>{const isAll=btn.textContent.trim().startsWith('All');const bId=isAll?'all':Object.keys(S.lots).find(lid=>btn.textContent.includes(S.lots[lid].name));btn.classList.toggle('on',(isAll&&id==='all')||(!isAll&&bId===id));});filterSess();}
function filterSess(){const q=(document.getElementById('ssearch')?.value||'').toUpperCase().trim();const ro=!isMgr();const allActive=S.sess.filter(s=>gSt(s)!=='expired');let filtered=S.sfLot==='all'?allActive:allActive.filter(s=>s.lotId===S.sfLot);if(q)filtered=filtered.filter(s=>s.plate.includes(q)||s.id.toUpperCase().includes(q));const wrap=document.getElementById('stbl');if(wrap)wrap.innerHTML=bSessTable(filtered,ro);const badge=document.getElementById('sbadge');if(badge)badge.textContent=filtered.length+' shown';}
function bSessTable(rows,ro){if(!rows.length)return`<table><thead><tr><th>Plate</th><th>Lot</th><th>Type</th><th>Paid</th><th>Status</th><th>Remaining</th>${ro?'':'<th></th>'}</tr></thead><tbody><tr><td colspan="${ro?6:7}" style="text-align:center;padding:28px;color:var(--t3)">No active sessions</td></tr></tbody></table>`;return`<table><thead><tr><th>Plate</th><th>Lot</th><th>Type</th><th>Paid</th><th>Status</th><th>Remaining</th>${ro?'':'<th></th>'}</tr></thead><tbody>${rows.map(s=>{const rem=remMs(s),st=gSt(s);const pct=Math.max(0,Math.min(100,Math.round(rem/(s.duration*3600000)*100)));const bc=st==='active'?'#2e7d32':st==='expiring'?'#e65100':'#d32f2f';const ln=(S.lots[s.lotId]||{name:'?'}).name.split(' ').slice(0,2).join(' ');const vn=s.valId&&S.vals[s.valId]?S.vals[s.valId].name:'';return`<tr><td class="pc">${s.plate}</td><td style="font-size:11px;color:var(--t3)">${ln}</td><td style="color:var(--t2);font-size:12px">${s.type}${vn?`<br><span style="font-size:10px;color:#b45309"><i class="ti ti-discount" style="font-size:10px"></i> ${vn}</span>`:''}</td><td style="font-family:var(--fc);font-weight:700;font-size:14px;color:${s.paid===0?'#10b981':'var(--t1)'}">$${s.paid.toFixed(2)}</td><td><span class="sp ${st}">${st==='active'?'Active':st==='expiring'?'Expiring':'Expired'}</span>${s.valId?`<span class="sp val" style="margin-left:3px;font-size:10px"><i class="ti ti-discount" style="font-size:9px"></i>Val</span>`:''}</td><td><div style="font-family:var(--fc);font-size:13px;font-weight:700">${fmtT(rem)}</div><div class="tb2"><div class="tb2f" style="width:${pct}%;background:${bc}"></div></div></td>${ro?'':`<td style="display:flex;gap:4px;flex-wrap:wrap">${s.phone&&!s.smsSent&&st!=='expired'?`<button class="ab" onclick="doSms('${s.id}')"><i class="ti ti-message-circle" style="font-size:11px"></i></button>`:''}<button class="ab danger" onclick="S.sess=S.sess.filter(x=>x.id!=='${s.id}');filterSess()">Remove</button></td>`}</tr>`;}).join('')}</tbody></table>`;}
function doSms(id){const s=S.sess.find(x=>x.id===id);if(!s||!s.phone)return;s.smsSent=true;const t=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),l=S.lots[s.lotId]||{name:'?',zone:''};S.smsLog.unshift({time:t,plate:s.plate,lot:l.name,msg:'Manual 20 min warning'});document.getElementById('sab').innerHTML=`To <strong>${s.phone}</strong>:<br>"${bSms(s.plate,l,s.id)}"`;document.getElementById('smsalert').classList.add('show');setTimeout(()=>document.getElementById('smsalert').classList.remove('show'),6000);filterSess();}

function rLots(){return`<div><div class="lg">${Object.values(S.lots).map(l=>{const ls=S.sess.filter(s=>s.lotId===l.id&&gSt(s)!=='expired');const rev=S.sess.filter(s=>s.lotId===l.id).reduce((a,s)=>a+s.paid,0);const er=[l.rates.hourly&&'Hourly',l.rates.event&&'Event',l.rates.monthly&&'Monthly'].filter(Boolean).join(', ')||'None';const lv=Object.values(S.vals).filter(v=>v.lotId===l.id&&v.active).length;const ap=S.passes.filter(p=>p.lotId===l.id&&p.status==='active').length;return`<div class="lcard"><div class="lch"><div class="lcn">${l.name}</div><div class="lcz">Zone ${l.zone} · ${l.address}</div></div><div class="lcs"><div class="lsr"><span class="lsl">Status</span><span style="font-family:var(--fc);font-size:14px;font-weight:600;color:${l.open?'var(--grn)':'var(--red)'}">${l.open?'Open':'Closed'}</span></div><div class="lsr"><span class="lsl">Active sessions</span><span style="font-family:var(--fc);font-size:14px;font-weight:600">${ls.length}</span></div><div class="lsr"><span class="lsl">Today revenue</span><span style="font-family:var(--fc);font-size:14px;font-weight:600;color:var(--grn)">$${rev.toFixed(2)}</span></div><div class="lsr"><span class="lsl">Rates</span><span style="font-family:var(--fc);font-size:12px;font-weight:600">${er}</span></div><div class="lsr"><span class="lsl">Service fees</span><span style="font-family:var(--fc);font-size:11px;font-weight:600;color:var(--t2)">${feeL(l)}</span></div><div class="lsr"><span class="lsl">Active validations</span><span style="font-family:var(--fc);font-size:14px;font-weight:600;color:${lv>0?'#b45309':'var(--t3)'}">${lv}</span></div><div class="lsr"><span class="lsl">Monthly passes</span><span style="font-family:var(--fc);font-size:14px;font-weight:600;color:${ap>0?'var(--blue)':'var(--t3)'}">${ap} active</span></div>${l.rates.monthly?`<div class="lsr"><span class="lsl">Monthly signup</span><span class="selfserve-badge ${l.monthlyselfsrv?'on':'off'}">${l.monthlyselfsrv?'Self-serve':'Invite only'}</span></div>`:''}</div><div class="lcq"><div style="background:#fff;border:1.5px solid var(--g2);border-radius:6px;padding:6px;flex-shrink:0">${genQR(l.id,true)}</div><div class="lqi"><div class="lql">Lot QR</div><div class="lqu">cityparkmanagement.app/pay?lot=${l.id}&zone=${l.zone}</div><button class="ab" style="margin-top:6px" onclick="viewLotQR('${l.id}')"><i class="ti ti-arrows-maximize" style="font-size:11px;margin-right:3px"></i>View</button></div></div><div class="lac"><button class="ab" onclick="openLM('${l.id}')"><i class="ti ti-settings" style="font-size:11px;margin-right:3px"></i>Edit</button><button class="ab" onclick="S.lots['${l.id}'].open=!S.lots['${l.id}'].open;render()">${l.open?'Close':'Open'}</button>${l.rates.monthly?`<button class="ab blue-btn" onclick="S.tab='passes';S.passFilter='all';render();setTimeout(()=>openPassModal('${l.id}'),100)"><i class="ti ti-mail" style="font-size:11px;margin-right:3px"></i>Send Pass</button>`:''}<button class="ab danger" onclick="if(Object.keys(S.lots).length<=1){alert('Must keep at least one lot.');return;}if(confirm('Delete?')){delete S.lots['${l.id}'];deleteLotDB('${l.id}');render()}"><i class="ti ti-trash" style="font-size:11px"></i></button></div></div>`;}).join('')}<div class="addl" onclick="openLM(null)"><i class="ti ti-plus"></i><span>Add New Lot</span></div></div></div>`;}
function viewLotQR(lotId){const l=S.lots[lotId];document.getElementById('qrt').textContent=`QR — ${l.name}`;document.getElementById('qrb').innerHTML=`<div style="background:#fff;border:2px solid var(--g2);border-radius:10px;padding:16px;display:inline-block;margin-bottom:14px">${genQR(lotId,false)}</div><div style="font-family:var(--fc);font-size:20px;font-weight:900;text-transform:uppercase;margin-bottom:4px">${l.name}</div><div style="font-family:var(--fc);font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--lime-dark);margin-bottom:12px">Zone ${l.zone}</div><div style="font-size:12px;color:var(--t3);word-break:break-all;padding:8px 12px;background:var(--g1);border-radius:6px">cityparkmanagement.app/pay?lot=${l.id}&zone=${l.zone}</div>`;document.getElementById('qr-modal').classList.add('show');}
function openLM(lotId){
  S.eLot=lotId;const l=lotId?S.lots[lotId]:null;
  document.getElementById('lmt').textContent=lotId?`Edit — ${l.name}`:'Add New Lot';
  const r=l?l.rates:{hourly:true,event:true,monthly:true};
  const p=l?l.pricing:{hourly:3.50,max_daily:22,event:18,monthly:120};
  const f=l?l.fees:{hourly:{enabled:true,amount:0.25},event:{enabled:true,amount:0.50},monthly:{enabled:false,amount:0}};
  const selfserv=l?l.monthlyselfsrv:true;
  document.getElementById('lmb').innerHTML=`
    <div class="sdv"><i class="ti ti-building" style="font-size:12px"></i>Lot Details</div>
    <div class="fg"><label class="fl">Lot name</label><input class="fi" id="m-name" value="${l?escH(l.name):''}" placeholder="e.g. South Parking Deck"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><div class="fg"><label class="fl">Zone</label><input class="fi" id="m-zone" value="${l?l.zone:''}" placeholder="e.g. 1042"></div><div class="fg"><label class="fl">Address</label><input class="fi" id="m-addr" value="${l?escH(l.address):''}" placeholder="e.g. 500 Main St"></div></div>
    <div class="sdv"><i class="ti ti-toggle-right" style="font-size:12px"></i>Rate Types</div>
    ${[{k:'hourly',l:'Hourly',s:'Per-hour rate'},{k:'event',l:'Event Parking',s:'Flat rate for events'},{k:'monthly',l:'Monthly pass',s:'30-day recurring pass'}].map(({k,l:lb,s})=>`<div class="tr"><div><div class="trl">${lb}</div><div class="trs">${s}</div></div><label class="tg"><input type="checkbox" id="r-${k}"${r[k]?' checked':''}><span class="tgs"></span></label></div>`).join('')}
    <div class="sdv bl"><i class="ti ti-id-badge" style="font-size:12px"></i>Monthly Pass Signup</div>
    <div class="tr"><div><div class="trl">Allow self-serve monthly signup</div><div class="trs">On: Monthly Pass appears in Pay tab when customers scan this lot's QR.<br>Off: Invite-only — Pay tab shows a notice to contact the office.</div></div><label class="tg"><input type="checkbox" id="m-selfserv"${selfserv?' checked':''}><span class="tgs"></span></label></div>
    <div class="sdv"><i class="ti ti-currency-dollar" style="font-size:12px"></i>Rates</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><div class="fg"><label class="fl">Hourly rate</label><div class="piw"><span>$</span><input type="number" id="m-hourly" min="0" step="0.25" value="${p.hourly.toFixed(2)}"></div></div><div class="fg"><label class="fl">Daily max</label><div class="piw"><span>$</span><input type="number" id="m-max" min="0" step="0.50" value="${p.max_daily.toFixed(2)}"></div></div><div class="fg"><label class="fl">Event rate</label><div class="piw"><span>$</span><input type="number" id="m-event" min="0" step="0.50" value="${p.event.toFixed(2)}"></div></div><div class="fg"><label class="fl">Monthly</label><div class="piw"><span>$</span><input type="number" id="m-monthly" min="0" step="5" value="${p.monthly.toFixed(2)}"></div></div></div>
    <div class="sdv"><i class="ti ti-receipt" style="font-size:12px"></i>Service Fees</div>
    ${[{k:'hourly',l:'Hourly'},{k:'event',l:'Event Parking'},{k:'monthly',l:'Monthly'}].map(({k,l:lb})=>`<div class="ftr"><div class="ftl">${lb}</div><div class="ftt"><label class="tg" style="width:32px;height:19px"><input type="checkbox" id="fe-${k}"${f[k].enabled?' checked':''} onchange="document.getElementById('fa-${k}').disabled=!this.checked"><span class="tgs"></span></label><span>Fee on</span></div><div class="fmi"><span>$</span><input type="number" id="fa-${k}" min="0" step="0.05" value="${f[k].amount.toFixed(2)}"${f[k].enabled?'':' disabled'}></div></div>`).join('')}`;
  document.getElementById('lot-modal').classList.add('show');
}
function saveLot(){const name=document.getElementById('m-name').value.trim(),zone=document.getElementById('m-zone').value.trim(),address=document.getElementById('m-addr').value.trim();if(!name||!zone){alert('Name and zone required.');return;}const rh=document.getElementById('r-hourly').checked,re=document.getElementById('r-event').checked,rm=document.getElementById('r-monthly').checked;if(!rh&&!re&&!rm){alert('At least one rate type required.');return;}const selfserv=document.getElementById('m-selfserv').checked;const pricing={hourly:+document.getElementById('m-hourly').value||3.5,max_daily:+document.getElementById('m-max').value||22,event:+document.getElementById('m-event').value||18,monthly:+document.getElementById('m-monthly').value||120};const fees={hourly:{enabled:document.getElementById('fe-hourly').checked,amount:+document.getElementById('fa-hourly').value||0},event:{enabled:document.getElementById('fe-event').checked,amount:+document.getElementById('fa-event').value||0},monthly:{enabled:document.getElementById('fe-monthly').checked,amount:+document.getElementById('fa-monthly').value||0}};const rates={hourly:rh,event:re,monthly:rm};if(S.eLot){Object.assign(S.lots[S.eLot],{name,zone,address,pricing,fees,rates,monthlyselfsrv:selfserv});saveLotDB(S.lots[S.eLot]);}else{const id='lot'+Date.now();const nl={id,name,zone,address,open:true,rates,monthlyselfsrv:selfserv,fees,pricing};S.lots[id]=nl;saveLotDB(nl);}closeM('lot-modal');render();}

function rValidations(){const vals=Object.values(S.vals);return`<div><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px"><div><div style="font-family:var(--fc);font-size:13px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.04em">${vals.length} validations · ${vals.filter(v=>v.active).length} active</div></div><button onclick="openVM(null)" style="background:var(--gold);color:var(--blk);border:none;border-radius:9px;padding:10px 18px;font-family:var(--fc);font-size:13px;font-weight:900;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;gap:6px"><i class="ti ti-plus" style="font-size:13px"></i>New Validation</button></div><div class="vg">${vals.map(val=>{const l=S.lots[val.lotId];const tl=val.type==='free'?'Free Parking':val.type==='percent'?`${val.discountPct}% Off`:`$${val.discountAmt.toFixed(2)} Off`;const tc=val.type==='free'?'vtf':'vtd';return`<div class="vc${val.active?' ac':''}"><div class="vch"><div><div class="vcn">${val.name}</div><div class="vcl2"><i class="ti ti-parking" style="font-size:10px;margin-right:3px"></i>${l?.name||'?'}</div></div><div class="vsd${val.active?' on':' off'}"></div></div><div class="vcb"><div class="vdr"><span class="vdl">Discount</span><span class="vtb ${tc}">${tl}</span></div><div class="vdr"><span class="vdl">Code</span><span class="cc"><i class="ti ti-discount" style="font-size:11px"></i>${val.code}</span></div>${val.maxHours>0?`<div class="vdr"><span class="vdl">Max hrs</span><span style="font-weight:600;font-family:var(--fc);font-size:14px">${val.maxHours}hr</span></div>`:''}<div class="vdr"><span class="vdl">Status</span><span style="font-weight:600;font-family:var(--fc);font-size:14px;color:${val.active?'var(--grn)':'var(--t3)'}">${val.active?'Active':'Inactive'}</span></div>${val.notes?`<div style="font-size:11px;color:var(--t3);margin-top:6px;font-style:italic">${val.notes}</div>`:''}</div><div class="vqs"><div>${genValQR(val.id,true)}</div><div class="vqi"><div class="vql">Code: <strong>${val.code}</strong></div><div class="vqu">cityparkmanagement.app/pay?lot=${val.lotId}&code=${val.code}</div></div></div><div class="vac"><button class="ab" onclick="openVQR('${val.id}')"><i class="ti ti-qrcode" style="font-size:11px;margin-right:3px"></i>QR</button><button class="ab" onclick="openVM('${val.id}')"><i class="ti ti-settings" style="font-size:11px;margin-right:3px"></i>Edit</button><button class="ab" onclick="S.tab='billing';render()" style="border-color:#2563eb;color:#2563eb"><i class="ti ti-file-invoice" style="font-size:11px;margin-right:3px"></i>Report</button><button class="ab" onclick="S.vals['${val.id}'].active=!S.vals['${val.id}'].active;render()">${val.active?'Deactivate':'Activate'}</button><button class="ab danger" onclick="if(confirm('Delete?')){delete S.vals['${val.id}'];deleteValDB('${val.id}');render()}"><i class="ti ti-trash" style="font-size:11px"></i></button></div></div>`;}).join('')}<div class="addc" onclick="openVM(null)"><i class="ti ti-plus"></i><span>New Validation</span></div></div></div>`;}
function openVM(valId){S.eVal=valId;const val=valId?S.vals[valId]:null;if(!val)S.newVT='free';else S.newVT=val.type;document.getElementById('vmt').textContent=valId?`Edit — ${val.name}`:'New Validation';const lotOpts=Object.values(S.lots).map(l=>`<option value="${l.id}"${(val?.lotId||'lot1')===l.id?' selected':''}>${l.name}</option>`).join('');document.getElementById('vmb').innerHTML=`<div class="fg"><label class="fl">Client / Business Name</label><input class="fi" id="vm-name" value="${val?escH(val.name):''}" placeholder="e.g. The Grand Hotel"></div><div class="fg"><label class="fl">Lot</label><select class="fse" id="vm-lot">${lotOpts}</select></div><div class="sdv go"><i class="ti ti-discount" style="font-size:12px"></i>Validation Code</div><div class="fg"><label class="fl">Code customers type at checkout</label><input class="fi" id="vm-code" value="${val?val.code:''}" placeholder="e.g. HOTEL2024" maxlength="20" oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'');document.getElementById('vpc').textContent=this.value||'CODE';document.getElementById('vce').style.display='none'" style="font-family:var(--fc);font-size:20px;font-weight:800;letter-spacing:.12em;text-transform:uppercase"><div id="vce" style="color:var(--red);font-size:11px;margin-top:4px;display:none">Code already in use.</div><div style="margin-top:8px;display:flex;align-items:center;gap:8px"><span style="font-size:12px;color:var(--t3)">Preview:</span><span style="background:var(--blk);color:var(--lime);border-radius:5px;padding:4px 10px;font-family:var(--fc);font-size:14px;font-weight:800;letter-spacing:.12em" id="vpc">${val?val.code:'CODE'}</span></div></div><div class="sdv go"><i class="ti ti-discount" style="font-size:12px"></i>Discount Type</div><div class="dtg" id="dtg">${[{t:'free',i:'🎁',l:'Free Parking',s:'Customer pays nothing'},{t:'percent',i:'%',l:'Percentage Off',s:'e.g. 50% off'},{t:'flat',i:'$',l:'Flat Amount Off',s:'e.g. $5 off'}].map(o=>`<div class="dto${S.newVT===o.t?' on':''}" onclick="setVT('${o.t}')"><div class="dti">${o.i}</div><div class="dtl">${o.l}</div><div class="dts">${o.s}</div></div>`).join('')}</div><div id="vdf">${S.newVT==='percent'?`<div class="fg"><label class="fl">Discount %</label><div class="piw" style="max-width:130px"><span>%</span><input type="number" id="vm-pct" min="1" max="100" step="1" value="${val?.discountPct||50}"></div></div>`:''}${S.newVT==='flat'?`<div class="fg"><label class="fl">Amount Off</label><div class="piw" style="max-width:130px"><span>$</span><input type="number" id="vm-amt" min="0.50" step="0.50" value="${val?.discountAmt||5}"></div></div>`:''}</div><div class="fg"><label class="fl">Max hours <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:11px;color:var(--t3)">(0 = no limit)</span></label><div class="piw" style="max-width:130px"><span style="font-size:12px;padding:0 6px">hrs</span><input type="number" id="vm-hours" min="0" step="1" value="${val?.maxHours||0}"></div></div><div class="fg"><label class="fl">Notes (internal)</label><textarea class="fta" id="vm-notes" placeholder="e.g. For hotel guests only" style="min-height:60px">${val?.notes||''}</textarea></div><div class="fg" style="display:flex;align-items:center;justify-content:space-between"><div><label class="fl" style="margin:0">Active</label><div style="font-size:11px;color:var(--t3);margin-top:2px">Inactive codes rejected at checkout</div></div><label class="tg"><input type="checkbox" id="vm-active"${val?val.active?' checked':'':' checked'}><span class="tgs"></span></label></div>`;document.getElementById('val-modal').classList.add('show');}
function setVT(t){S.newVT=t;document.querySelectorAll('.dto').forEach(el=>{el.classList.toggle('on',el.querySelector('.dtl').textContent.toLowerCase().includes(t==='free'?'free':t==='percent'?'percentage':'flat'));});const f=document.getElementById('vdf');if(f)f.innerHTML=t==='percent'?`<div class="fg"><label class="fl">Discount %</label><div class="piw" style="max-width:130px"><span>%</span><input type="number" id="vm-pct" min="1" max="100" step="1" value="50"></div></div>`:t==='flat'?`<div class="fg"><label class="fl">Amount Off</label><div class="piw" style="max-width:130px"><span>$</span><input type="number" id="vm-amt" min="0.50" step="0.50" value="5"></div></div>`:'';}
function saveVal(){const name=document.getElementById('vm-name')?.value.trim(),code=(document.getElementById('vm-code')?.value||'').toUpperCase().replace(/[^A-Z0-9]/g,''),lotId=document.getElementById('vm-lot')?.value;const maxHours=parseInt(document.getElementById('vm-hours')?.value)||0,notes=document.getElementById('vm-notes')?.value||'',active=document.getElementById('vm-active')?.checked||false;if(!name){alert('Business name required.');return;}if(!code){alert('Validation code required.');return;}if(codeTaken(code,S.eVal)){const el=document.getElementById('vce');if(el)el.style.display='block';return;}const dp=S.newVT==='percent'?parseFloat(document.getElementById('vm-pct')?.value)||50:0,da=S.newVT==='flat'?parseFloat(document.getElementById('vm-amt')?.value)||5:0;if(S.eVal){Object.assign(S.vals[S.eVal],{name,code,lotId,type:S.newVT,discountPct:dp,discountAmt:da,maxHours,notes,active});saveValDB(S.vals[S.eVal]);}else{const id='val'+Date.now();const nv={id,name,code,lotId,type:S.newVT,discountPct:dp,discountAmt:da,maxHours,active,notes};S.vals[id]=nv;saveValDB(nv);}closeM('val-modal');render();}

function rPasses(){

  return`<div>

  </div>`;}
function passRows(filtered){if(!filtered.length)return`<tr><td colspan="9" style="text-align:center;padding:28px;color:var(--t3)">No passes match your filter.</td></tr>`;return filtered.map(p=>{const l=S.lots[p.lotId];const sh=p.status==='active'?`<span class="sp active">Active</span>`:p.status==='pending'?`<span class="sp pending">Pending</span>`:`<span class="sp canceled">Canceled</span>`;const ni=p.status==='active'?`<div style="font-family:var(--fc);font-size:13px;font-weight:700;color:var(--blue)">${fmtDate(p.nextBillDate)}</div><div style="font-size:10px;color:var(--t3);margin-top:2px">Next auto-charge</div>`:p.status==='pending'?`<div style="font-size:12px;color:var(--t3)">Invite sent · awaiting signup</div>`:p.canceledOn?`<div style="font-size:12px;color:var(--t3)">Canceled ${fmtDate(p.canceledOn)}</div>`:'—';return`<tr><td><div style="font-weight:600;color:var(--t1)">${p.name}</div><div style="font-size:11px;color:var(--t3);margin-top:2px"><i class="ti ti-mail" style="font-size:11px;margin-right:3px"></i>${p.email}</div></td><td style="font-family:var(--fc);font-size:12px;font-weight:700;color:var(--t3)">${p.id}</td><td style="font-size:12px;color:var(--t2)">${l?.name||'?'}</td><td>${sh}</td><td style="font-size:12px;color:var(--t3)">${fmtDate(p.startDate)}</td><td>${ni}</td><td style="font-family:var(--fc);font-weight:800;font-size:15px">$${p.monthlyAmount.toFixed(2)}</td><td style="font-family:var(--fc);font-weight:700;font-size:13px;color:var(--grn)">$${p.totalBilled.toFixed(2)}</td><td><div class="pass-row-actions">${p.status==='pending'?`<button class="ab blue-btn" onclick="resendInvite('${p.id}')"><i class="ti ti-send" style="font-size:11px;margin-right:3px"></i>Resend</button>`:''}${p.status==='active'?`<button class="ab danger" onclick="promptCancel('${p.id}')"><i class="ti ti-player-stop" style="font-size:11px;margin-right:3px"></i>Cancel</button>`:''}${p.status==='canceled'?`<div style="font-size:11px;color:var(--t3)">—</div>`:''}</div></td></tr>`;}).join('');}
function filterPasses(){const q=S.passSearch.toUpperCase().trim();let filtered=S.passes;if(S.passFilter!=='all')filtered=filtered.filter(p=>p.status===S.passFilter);if(S.passLot&&S.passLot!=='all')filtered=filtered.filter(p=>p.lotId===S.passLot);if(q)filtered=filtered.filter(p=>p.name.toUpperCase().includes(q)||p.email.toUpperCase().includes(q)||p.id.includes(q));const tbody=document.querySelector('#pass-table tbody');if(tbody)tbody.innerHTML=passRows(filtered);const badge=document.getElementById('pass-badge');if(badge)badge.textContent=filtered.length+' shown';}
function openPassModal(prefillLotId){const lotOpts=Object.values(S.lots).filter(l=>l.rates.monthly).map(l=>`<option value="${l.id}"${(prefillLotId||'lot1')===l.id?' selected':''}>${l.name} — $${l.pricing.monthly}/mo</option>`).join('');if(!lotOpts){alert('No lots have monthly parking enabled.');return;}document.getElementById('pmt').textContent='Send Pass Invite';document.getElementById('pmb').innerHTML=`<p style="font-size:13px;color:var(--t2);line-height:1.7;margin-bottom:16px">Enter the subscriber's details below. They'll receive a personalized signup link.</p><div class="sdv bl"><i class="ti ti-user" style="font-size:12px"></i>Subscriber Details</div><div class="fg"><label class="fl">Full name</label><input class="fi" id="pi-name" placeholder="e.g. James Thornton" oninput="liveUP()"></div><div class="fg"><label class="fl">Email address</label><input class="fi" id="pi-email" type="email" placeholder="e.g. james@example.com" oninput="liveUP()"></div><div class="fg"><label class="fl">Lot</label><select class="fse" id="pi-lot" onchange="liveUP()">${lotOpts}</select></div><div class="collapse-toggle" onclick="toggleCollapse('mc')"><span class="collapse-label"><i class="ti ti-pencil" style="font-size:13px"></i>Customize invite message</span><i class="ti ti-chevron-down collapse-icon" id="mc-icon"></i></div><div class="collapse-body" id="mc"><div class="fg"><label class="fl">Subject line</label><input class="fi" id="pi-subj" value="${escH(S.inviteSubject)}" oninput="liveUP()"></div><div class="fg"><label class="fl">Message body</label><div class="ph-tags">${['{FIRST_NAME}','{LOT_NAME}','{ZONE}','{MONTHLY_RATE}','{SIGNUP_LINK}'].map(ph=>`<span class="ph-tag" onclick="insertPH('pi-body','${ph}')">${ph}</span>`).join('')}</div><textarea class="fta" id="pi-body" rows="8" style="min-height:180px;font-family:var(--fc);font-size:13px;line-height:1.7" oninput="liveUP()">${escH(S.inviteTmpl)}</textarea><div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px;flex-wrap:wrap;gap:8px"><span style="font-size:11px;color:var(--t3)" id="pi-cnt">${S.inviteTmpl.length} chars</span><div style="display:flex;gap:8px"><button onclick="const b=document.getElementById('pi-body')?.value||'';const s=document.getElementById('pi-subj')?.value||'';S.inviteTmpl=b;S.inviteSubject=s;this.innerHTML='✓ Saved!';this.style.color='var(--grn)';setTimeout(()=>{this.innerHTML='Save as default';this.style.color='';},2000)" style="background:none;border:1.5px solid var(--blue);border-radius:6px;padding:5px 12px;font-family:var(--fc);font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--blue);cursor:pointer">Save as default</button><button onclick="document.getElementById('pi-body').value=DEFAULT_INVITE_TMPL;document.getElementById('pi-subj').value='Your City Park monthly parking pass invitation';liveUP()" style="background:none;border:1.5px solid var(--g2);border-radius:6px;padding:5px 12px;font-family:var(--fc);font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);cursor:pointer">Reset</button></div></div></div></div><div class="sdv bl" style="margin-top:18px"><i class="ti ti-eye" style="font-size:12px"></i>Email Preview</div><div id="pi-prev">${buildEP('James Thornton','james@example.com',Object.values(S.lots).find(l=>l.rates.monthly)||Object.values(S.lots)[0],S.inviteTmpl,S.inviteSubject)}</div>`;document.getElementById('pass-modal').classList.add('show');setTimeout(()=>document.getElementById('pi-name')?.focus(),50);}

ill not occur)</span><span style="font-family:var(--fc);font-weight:700;color:var(--red)">${fmtDate(p.nextBillDate)}</span></div>`:''}</div></div>`;document.getElementById('cancel-modal').classList.add('show');}

function applyBiP(p){if(p==='month'){S.biF=toDS(new Date(NOW.getFullYear(),NOW.getMonth(),1));S.biT=toDS(NOW);}else if(p==='lastmonth'){S.biF=toDS(new Date(NOW.getFullYear(),NOW.getMonth()-1,1));S.biT=toDS(new Date(NOW.getFullYear(),NOW.getMonth(),0));}else if(p==='3m'){S.biF=toDS(new Date(NOW.getFullYear(),NOW.getMonth()-2,1));S.biT=toDS(NOW);}S.biP=p;render();}

function openInv(valId){const val=S.vals[valId],l=S.lots[val.lotId];const sess=vsessInR(S.biF,S.biT,'all').filter(s=>s.valId===valId);const td=sess.reduce((a,s)=>a+s.disc,0),tp=sess.reduce((a,s)=>a+s.paid,0),tb=sess.reduce((a,s)=>a+s.base,0);const rl=fmtRL(S.biF,S.biT);const invNum=`CPM-${S.biF.replace(/-/g,'').slice(0,6)}-${val.id.toUpperCase()}`;document.getElementById('ivt').textContent=`Invoice — ${val.name}`;document.getElementById('ivb').innerHTML=`<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;padding-bottom:16px;border-bottom:2px solid var(--g2)"><div><div style="font-family:var(--fc);font-size:22px;font-weight:900;text-transform:uppercase">City Park Management</div><div style="font-size:13px;color:var(--t3);margin-top:3px">Parking Validation Services · ${l?.name||''}</div></div><div style="text-align:right"><div style="font-family:var(--fc);font-size:11px;font-weight:700;text-transform:uppercase;color:var(--t3);margin-bottom:4px">Bill To</div><div style="font-size:14px;font-weight:600">${val.name}</div></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">${[['Invoice #',invNum],['Period',rl],['Discount',vtLabel(val)],['Lot',l?.name||'']].map(([lb,v])=>`<div style="background:var(--g1);border-radius:6px;padding:8px 12px"><div style="font-family:var(--fc);font-size:10px;font-weight:700;text-transform:uppercase;color:var(--t3);margin-bottom:2px">${lb}</div><div style="font-family:var(--fc);font-size:14px;font-weight:800">${v}</div></div>`).join('')}</div>${sess.length===0?`<div style="text-align:center;padding:20px;color:var(--t3);background:var(--g1);border-radius:8px;margin-bottom:16px">No usage. $0.00 due.</div>`:`<div style="border:1px solid var(--g2);border-radius:8px;overflow:hidden;margin-bottom:16px"><table><thead><tr style="background:var(--g1)"><th>Date</th><th>Plate</th><th>Type</th><th>Base</th><th>Discount</th><th>Cust. Paid</th></tr></thead><tbody>${sess.s function rRevenue(){const lotIds=Object.keys(S.lots);const data=bDaily(S.rvF,S.rvT,S.rvL);const tp=data.reduce((a,d)=>a+d.pk,0),tf=data.reduce((a,d)=>a+d.fe,0),gt=tp+tf;const mx=Math.max(...data.map(d=>d.tot),1);const ln=S.rvL==='all'?'All Lots':(S.lots[S.rvL]?.name||'');const rl=fmtRL(S.rvF,S.rvT);return`<div><div class="fbar"><span class="flbl">Range:</span>${[{v:'7d',l:'7 Days'},{v:'14d',l:'14 Days'},{v:'30d',l:'30 Days'},{v:'month',l:'This Month'},{v:'custom',l:'Custom'}].map(p=>`<button class="pbtn${S.rvP===p.v?' on':''}" onclick="applyRvP('${p.v}')">${p.l}</button>`).join('')}<div class="fdiv"></div><input id="rv-from" type="date" class="din" value="${S.rvF}"><span style="color:var(--t3);font-size:12px">to</span><input id="rv-to" type="date" class="din" value="${S.rvT}"><button class="apb" onclick="const f=document.getElementById('rv-from')?.value,t=document.getElementById('rv-to')?.value;if(f)S.rvF=f;if(t)S.rvT=t;S.rvP='custom';render()">Apply</button><div class="fdiv"></div><span class="flbl">Lot:</span><button class="ltb${S.rvL==='all'?' on':''}" onclick="S.rvL='all';render()">All</button>${lotIds.map(id=>`<button class="ltb${S.rvL===id?' on':''}" onclick="S.rvL='${id}';render()">${S.lots[id].name}</button>`).join('')}</div><div class="rsc"><div class="rc tot"><div class="rcl">Total — ${ln}</div><div class="rcv">$${gt.toFixed(2)}</div><div class="rcs">${rl} · ${data.reduce((a,d)=>a+d.n,0)} transactions</div></div><div class="rc prk"><div class="rcl">Parking Charges</div><div class="rcv" style="color:#2563eb">$${tp.toFixed(2)}</div><div class="rcs">${gt>0?((tp/gt)*100).toFixed(1):0}% of total</div></div><div class="rc fee"><div class="rcl">Service Fees</div><div class="rcv">$${tf.toFixed(2)}</div><div class="rcs">${gt>0?((tf/gt)*100).toFixed(1):0}% of total</div></div></div><div class="rg2a"><div class="chartwrap"><div class="cwh2"><h3><i class="ti ti-chart-bar"></i>Daily Breakdown — ${ln}</h3></div><div class="cwb2"><div class="leg"><div class="lgi"><div class="lgd" style="background:#2563eb"></div>Parking</div><div class="lgi"><div class="lgd" style="background:#0d0d0d"></div>Fees</div></div><div class="bc">${data.map(d=>{const pw=Math.round((d.pk/mx)*200),fw=Math.round((d.fe/mx)*200);return`<div class="br"><div class="bda">${d.label}</div><div class="bt"><div class="bsw"><div class="bs pk" style="width:${Math.max(pw,2)}px"></div><div class="bla">$${d.pk.toFixed(0)}</div></div>${d.fe>0?`<div class="bsw"><div class="bs fe" style="width:${Math.max(fw,2)}px"></div><div class="bla" style="color:#555">$${d.fe.toFixed(2)}</div></div>`:''}</div><div class="bto">$${d.tot.toFixed(0)}</div></div>`;}).join('')}</div></div></div><div class="pn"><div class="ph"><h3><i class="ti ti-table"></i>Daily Summary — ${ln}</h3></div><div style="overflow-x:auto"><table><thead><tr><th>Date</th><th>Txns</th><th>Parking</th><th>Fees</th><th>Total</th></tr></thead><tbody>${[...data].reverse().map(d=>`<tr><td style="font-family:var(--fc);font-size:13px;font-weight:700">${d.label}</td><td style="color:var(--t3)">${d.n}</td><td style="font-family:var(--fc);font-weight:700;font-size:13px;color:#2563eb">$${d.pk.toFixed(2)}</td><td style="font-family:var(--fc);font-weight:700;font-size:13px">$${d.fe.toFixed(2)}</td><td style="font-family:var(--fc);font-weight:700;font-size:14px">$${d.tot.toFixed(2)}</td></tr>`).join('')}<tr style="background:var(--lime-bg)"><td style="font-family:var(--fc);font-weight:800;font-size:13px">TOTAL</td><td style="font-family:var(--fc);font-weight:800">${data.reduce((a,d)=>a+d.n,0)}</td><td style="font-family:var(--fc);font-weight:800;font-size:13px;color:#2563eb">$${tp.toFixed(2)}</td><td style="font-family:var(--fc);font-weight:800;font-size:13px">$${tf.toFixed(2)}</td><td style="font-family:var(--fc);font-weight:800;font-size:15px">$${gt.toFixed(2)}</td></tr></tbody></table></div></div></div></div>`;}
function applyRvP(p){if(p==='7d'){S.rvF=toDS(new Date(NOW.getFullYear(),NOW.getMonth(),NOW.getDate()-6));S.rvT=toDS(NOW);}else if(p==='14d'){S.rvF=toDS(new Date(NOW.getFullYear(),NOW.getMonth(),NOW.getDate()-13));S.rvT=toDS(NOW);}else if(p==='30d'){S.rvF=toDS(new Date(NOW.getFullYear(),NOW.getMonth(),NOW.getDate()-29));S.rvT=toDS(NOW);}else if(p==='month'){S.rvF=toDS(new Date(NOW.getFullYear(),NOW.getMonth(),1));S.rvT=toDS(NOW);}S.rvP=p;render();}

    <div class="stt" id="inv-save">✓ Template saved!</div>
  </div></div>
  <div class="pn"><div class="ph"><h3><i class="ti ti-receipt"></i>Receipt SMS Template</h3></div><div class="pb"><p style="font-size:13px;color:var(--t2);margin-bottom:12px;line-height:1.6">Sent when a session expires to customers who provided a phone number. Use <strong>{PLATE}</strong>, <strong>{LOT}</strong>, <strong>{ZONE}</strong>, <strong>{DURATION}</strong>, <strong>{AMOUNT}</strong>.</p><div class="fg"><label class="fl">Receipt message</label><textarea class="fta" id="receipt-tmpl">${escH(S.receiptTmpl)}</textarea><div style="font-size:11px;color:var(--t3);margin-top:4px" id="receiptcnt">${S.receiptTmpl.length} characters</div></div><div class="fg"><label class="fl">Live preview</label><div style="background:var(--g1);border-radius:8px;padding:12px;font-size:13px;color:var(--t2);line-height:1.6;border:1.5px solid var(--g2)" id="receiptprev">${'City Park Management: Receipt for ABC 1234 at Downtown Lot A (Zone 2987). Duration: 2hr. Amount paid: $7.25. Thank you for parking with us!'}</div></div><button class="svb" onclick="const v=document.getElementById('receipt-tmpl')?.value||'';S.receiptTmpl=v;const t=document.getElementById('receiptsave');if(t){t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}">✓ Save receipt template</button><div class="stt" id="receiptsave">✓ Saved!</div></div></div>   <div class="pn"><div class="ph"><h3><i class="ti ti-history"></i>SMS Log</h3></div><div class="pb">${S.smsLog.length===0?`<div style="text-align:center;padding:24px;color:var(--t3)">No alerts yet</div>`:''}<table><thead><tr><th>Time</th><th>Plate</th><th>Lot</th><th>Type</th></tr></thead><tbody>${S.smsLog.map(e=>`<tr><td style="font-family:var(--fc);font-size:12px;color:var(--t3)">${e.time}</td><td class="pc" style="font-size:14px">${e.plate}</td><td style="font-size:12px;color:var(--t2)">${e.lot}</td><td style="font-size:11px;color:var(--t3)">${e.msg}</td></tr>`).join('')}</tbody></table></div></div>
</div>`;}
function insertPH2(id,ph){const el=document.getElementById(id);if(!el)return;const s=el.selectionStart,e=el.selectionEnd;el.value=el.value.slice(0,s)+ph+el.value.slice(e);el.selectionStart=el.selectionEnd=s+ph.length;el.focus();refreshSP();}
function refreshSP(){const b=document.getElementById('settings-body')?.value||S.inviteTmpl;const s=document.getElementById('settings-subj')?.value||S.inviteSubject;const l=Object.values(S.lots).find(x=>x.rates.monthly)||Object.values(S.lots)[0];const prev=document.getElementById('settings-prev');if(prev)prev.innerHTML=buildEP('James Thornton','james@example.com',l,b,s);const cnt=document.getElementById('inv-cnt');if(cnt)cnt.textContent=b.length+' characters';}

function rUsers(){const mgrs=S.users.filter(u=>u.role==='manager');const emps=S.users.filter(u=>u.role==='employee');return`<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px"><div class="pn"><div class="ph"><h3><i class="ti ti-shield-check"></i>Managers</h3><button class="ab" style="border-color:#888;color:#aaa" onclick="openUM(null,'manager')"><i class="ti ti-plus" style="font-size:11px;margin-right:3px"></i>Add</button></div><div class="pb">${mgrs.map(u=>rUC(u)).join('')}</div></div><div class="pn"><div class="ph"><h3><i class="ti ti-user"></i>Employees</h3><button class="ab" style="border-color:#888;color:#aaa" onclick="openUM(null,'employee')"><i class="ti ti-plus" style="font-size:11px;margin-right:3px"></i>Add</button></div><div class="pb">${emps.length===0?`<div style="text-align:center;padding:20px;color:var(--t3);font-size:13px">No employees yet</div>`:''}${emps.map(u=>rUC(u)).join('')}<div style="margin-top:10px;padding:10px 12px;background:var(--lime-bg);border:1px solid var(--lime);border-radius:8px;font-size:12px;color:var(--t2)"><i class="ti ti-info-circle" style="font-size:13px;margin-right:4px;color:var(--lime-dark)"></i>Employees can view sessions and search plates only.</div></div></div></div>`;}
function rUC(u){const isSelf=u.id===S.cu?.id;const ini=u.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();const mgr=u.role==='manager';return`<div class="ucrd"><div class="ui"><div class="uav ${mgr?'av-m':'av-e'}">${ini}</div><div class="ud"><h4>${u.name}${isSelf?' <span style="font-size:10px;color:var(--t3);font-weight:400">(you)</span>':''}</h4><p>@${u.username} · <span class="rb ${mgr?'rb-m':'rb-e'}">${u.role}</span> · ${u.active?'Active':'Inactive'}</p></div></div><div class="ua"><button class="ab" onclick="openUM('${u.id}')"><i class="ti ti-pencil" style="font-size:11px"></i></button>${!isSelf?`<button class="ab danger" onclick="if(confirm('Delete?')){S.users=S.users.filter(x=>x.id!=='${u.id}');deleteUserDB('${u.id}');render()}"><i class="ti ti-trash" style="font-size:11px"></i></button>`:''}</div></div>`;}
function openUM(userId,defaultRole){S.eUsr=userId;const u=userId?S.users.find(x=>x.id===userId):null;document.getElementById('umt').textContent=userId?`Edit — ${u.name}`:defaultRole==='manager'?'Add Manager':'Add Employee';document.getElementById('umb').innerHTML=`<div class="fg"><label class="fl">Full name</label><input class="fi" id="um-name" value="${u?escH(u.name):''}" placeholder="e.g. Jane Smith"></div><div class="fg"><label class="fl">Username</label><input class="fi" id="um-user" value="${u?u.username:''}" placeholder="e.g. jsmith" style="font-family:var(--fc);font-size:16px;font-weight:700;letter-spacing:.04em"></div><div class="fg"><label class="fl">${u?'New password (blank = keep)':'Password'}</label><input class="fi" id="um-pass" type="text" placeholder="Enter password"></div><div class="fg"><label class="fl">Role</label><select class="fse" id="um-role"><option value="manager"${(u?.role||defaultRole)==='manager'?' selected':''}>Manager — full access</option><option value="employee"${(u?.role||defaultRole)==='employee'?' selected':''}>Employee — view only</option></select></div><div class="fg" style="display:flex;align-items:center;justify-content:space-between"><div><label class="fl" style="margin:0">Active</label><div style="font-size:11px;color:var(--t3);margin-top:2px">Inactive users cannot log in</div></div><label class="tg"><input type="checkbox" id="um-active"${u?u.active?' checked':'':' checked'}><span class="tgs"></span></label></div>`;document.getElementById('usr-modal').classList.add('show');}
function saveUser(){const name=document.getElementById('um-name').value.trim(),username=document.getElementById('um-user').value.trim(),pass=document.getElementById('um-pass').value.trim(),role=document.getElementById('um-role').value,active=document.getElementById('um-active').checked;if(!name||!username){alert('Name and username required.');return;}if(!S.eUsr&&!pass){alert('Password required.');return;}if(S.eUsr){const u=S.users.find(x=>x.id===S.eUsr);Object.assign(u,{name,username,role,active});if(pass)u.password=pass;saveUserDB(u);}else{if(S.users.find(u=>u.username===username)){alert('Username taken.');return;}const nu={id:'u'+Date.now(),name,username,password:pass,role,active};S.users.push(nu);saveUserDB(nu);}closeM('usr-modal');render();}

function attachEv(){
  const ls=document.getElementById('lot-sel');if(ls)ls.addEventListener('change',e=>{S.lotId=e.target.value;S.val=null;render();});
  const vs=document.getElementById('veh-sel');if(vs)vs.addEventListener('change',e=>S.vehicle=e.target.value);
  const pi=document.getElementById('phone-inp');if(pi)pi.addEventListener('input',e=>S.phone=e.target.value);
  const ti=document.getElementById('sms-tmpl');if(ti){ti.addEventListener('input',()=>{S.smsTmpl=ti.value;const prev=document.getElementById('smsprev'),cnt=document.getElementById('smscnt');if(prev)prev.textContent=bSms('ABC 1234',Object.values(S.lots)[0],'CPM-4921');if(cnt)cnt.textContent=ti.value.length+' characters';});} const ri=document.getElementById('receipt-tmpl');if(ri){ri.addEventListener('input',()=>{S.receiptTmpl=ri.value;const prev=document.getElementById('receiptprev'),cnt=document.getElementById('receiptcnt');const mockSess={plate:'ABC 1234',rate:'hourly',duration:2,paid:7.25};const mockLot=Object.values(S.lots)[0];if(prev)prev.textContent=bReceipt(mockSess,mockLot);if(cnt)cnt.textContent=ri.value.length+' characters';});}
}
let timerInt=null,adminInt=null;
function startTimer(){if(timerInt)clearInterval(timerInt);timerInt=setInterval(()=>{const el=document.getElementById('cdown');if(!el){clearInterval(timerInt);return;}if(S.payData)el.textContent=fmtT(remMs(S.payData));},15000);}
function bReceipt(s,l){const dur=s.rate==='hourly'?s.duration+'hr':s.rate==='event'?'Event':'Monthly';return S.receiptTmpl.replace('{PLATE}',s.plate).replace('{LOT}',l.name).replace('{ZONE}',l.zone).replace('{DURATION}',dur).replace('{AMOUNT}','$'+s.paid.toFixed(2));} function startAdminTimer(){if(adminInt)clearInterval(adminInt);adminInt=setInterval(()=>{S.sess.forEach(s=>{if(!s.smsSent&&s.phone&&gSt(s)==='expiring'){s.smsSent=true;const t=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),l=S.lots[s.lotId]||{name:'?',zone:''};S.smsLog.unshift({time:t,plate:s.plate,lot:l.name,msg:'Auto 20 min warning'});document.getElementById('sab').innerHTML=`To <strong>${s.phone}</strong>:<br>"${bSms(s.plate,l,s.id)}"`;document.getElementById('smsalert').classList.add('show');setTimeout(()=>document.getElementById('smsalert').classList.remove('show'),6000);}if(!s.receiptSent&&s.phone&&gSt(s)==='expired'){s.receiptSent=true;const t=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),l=S.lots[s.lotId]||{name:'?',zone:''};S.smsLog.unshift({time:t,plate:s.plate,lot:l.name,msg:'Receipt sent'});document.getElementById('sab').innerHTML=`Receipt to <strong>${s.phone}</strong>:<br>"${bReceipt(s,l)}"`;document.getElementById('smsalert').classList.add('show');setTimeout(()=>document.getElementById('smsalert').classList.remove('show'),6000);}});},30000);}

async function init(){
  const mc=document.getElementById('mc');
  mc.innerHTML='<div style="text-align:center;padding:60px;color:var(--t3);font-family:var(--fc);font-size:16px;font-weight:700;letter-spacing:.06em;text-transform:uppercase"><i class="ti ti-loader" style="font-size:28px;display:block;margin-bottom:12px;color:var(--lime)"></i>Loading...</div>';
  await loadFromDB();
  render();
}
init();
</script>
</body>
</html>
